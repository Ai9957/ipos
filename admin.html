  <script>
    window.POSDatabase = (function() {
      const firebaseConfig = { apiKey: "AIzaSyDTsrdVcwm7mi2aGoexNG4QqcEyn6JFqpw", authDomain: "project-a60e1765-a61e-40db-82e.firebaseapp.com", projectId: "project-a60e1765-a61e-40db-82e" };
      let dbMode = 'local', dbInstance = null;
      if (firebaseConfig.apiKey && typeof firebase !== 'undefined') {
        try { if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); dbInstance = firebase.firestore(); dbMode = 'firebase'; } catch(e) { console.error(e); }
      }
      const saveOrder = async (orderInfo) => {
        const newOrder = { ...orderInfo, status: 'pending', createdAt: new Date().toISOString() };
        if (dbMode === 'firebase') await dbInstance.collection('orders').add(newOrder);
      };
      const updateOrderStatus = async (orderId, status) => {
        const updateData = { status };
        if (status === 'completed') updateData.completedAt = new Date().toISOString();
        if (dbMode === 'firebase') await dbInstance.collection('orders').doc(orderId).update(updateData);
      };
      const subscribeToOrders = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('orders').orderBy('createdAt', 'desc').onSnapshot((s) => callback(s.docs.map(doc => ({ ...doc.data(), id: doc.id }))));
      };
      const getMenu = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('menu_items').onSnapshot((s) => callback(s.docs.map(doc => ({ ...doc.data(), id: doc.id }))));
      };
      const getCategoryOrder = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('category_order').onSnapshot((s) => callback(s.exists ? (s.data().order || []) : []));
      };
      const saveCategoryOrder = async (orderArr) => {
        if (dbMode === 'firebase') await dbInstance.collection('settings').doc('category_order').set({ order: orderArr });
      };
      const getItemOrders = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('item_orders').onSnapshot((s) => callback(s.exists ? s.data() : {}));
      };
      const saveItemOrders = async (ordersObj) => {
        if (dbMode === 'firebase') await dbInstance.collection('settings').doc('item_orders').set(ordersObj);
      };
      const getKDSSettings = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('kds_settings').onSnapshot((s) => callback(s.exists ? s.data() : { yellow: 5, red: 10 }));
      };
      const saveKDSSettings = async (settings) => {
        if (dbMode === 'firebase') await dbInstance.collection('settings').doc('kds_settings').set(settings);
      };
      const getUIVisibility = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('ui_visibility').onSnapshot((s) => callback(s.exists ? s.data() : { 
          types: ['內用', '外帶', '外送'], 
          payments: ['現金', '信用卡', 'LINE Pay'] 
        }));
      };
      const saveUIVisibility = async (settings) => {
        if (dbMode === 'firebase') await dbInstance.collection('settings').doc('ui_visibility').set(settings);
      };
      const getCategoryIcons = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('category_icons').onSnapshot((s) => callback(s.exists ? s.data() : {}));
      };
      const saveCategoryIcons = async (icons) => {
        if (dbMode === 'firebase') await dbInstance.collection('settings').doc('category_icons').set(icons);
      };
      const getBranding = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('branding').onSnapshot((s) => callback(s.exists ? s.data() : { 
          name: '德上 POS', 
          logo: 'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?auto=format&fit=crop&q=80&w=100&h=100' 
        }));
      };
      const saveBranding = async (branding) => {
        if (dbMode === 'firebase') await dbInstance.collection('settings').doc('branding').set(branding);
      };
      const saveMenuItem = async (item) => {
        const data = { ...item }; let id = data.id; delete data.id;
        if (dbMode === 'firebase') { if(id) await dbInstance.collection('menu_items').doc(String(id)).update(data); else await dbInstance.collection('menu_items').add(data); }
      };
      const deleteMenuItem = async (id) => { if (dbMode === 'firebase') await dbInstance.collection('menu_items').doc(id).delete(); };
      const importDefaultMenu = async (defaultItems) => {
        if (dbMode === 'firebase') { const batch = dbInstance.batch(); defaultItems.forEach(item => batch.set(dbInstance.collection('menu_items').doc(item.id.toString()), item)); await batch.commit(); }
      };
      return { 
        saveOrder, updateOrderStatus, subscribeToOrders, getMenu, 
        getCategoryOrder, saveCategoryOrder, getItemOrders, saveItemOrders, 
        getKDSSettings, saveKDSSettings, getUIVisibility, saveUIVisibility, 
        getCategoryIcons, saveCategoryIcons,
        getBranding, saveBranding,
        getStaff: (callback) => {
          if (dbMode === 'firebase') return dbInstance.collection('settings').doc('staff').onSnapshot((s) => callback(s.exists ? s.data().list : [
            { id: '1', name: '店長', title: '管理員', pin: '0000', role: 'admin' },
            { id: '2', name: '小明', title: '組長', pin: '1111', role: 'leader' },
            { id: '3', name: '小美', title: '收銀員', pin: '2222', role: 'cashier' }
          ]));
        },
        saveStaff: async (list) => {
          if (dbMode === 'firebase') await dbInstance.collection('settings').doc('staff').set({ list });
        },
        saveMenuItem, deleteMenuItem, importDefaultMenu 
      };

    })();
  </script>

    function OrderCard({ order, onComplete, getOrderNo, kdsSettings }) {
      const { useState, useEffect } = React;
      const [elapsed, setElapsed] = useState(0);

      const yellowThreshold = kdsSettings?.yellow || 5;
      const redThreshold = kdsSettings?.red || 10;

      useEffect(() => {
        const calc = () => {
          const start = new Date(order.createdAt).getTime();
          setElapsed(Math.floor((Date.now() - start) / 60000));
        };
        calc();
        const tid = setInterval(calc, 10000);
        return () => clearInterval(tid);
      }, [order.createdAt]);

      let color = '#2ed573'; // default green
      if (elapsed >= redThreshold) color = '#ff4757'; // urgent: red
      else if (elapsed >= yellowThreshold) color = '#f1c40f'; // warning: yellow

      const currentType = order.orderType || '內用';

      return (
        <div className="order-card" style={{ borderTop: `8px solid ${color}`, opacity: order.status === 'completed' ? 0.7 : 1 }}>
          <div className="order-card-header" style={{ background: color, color: color === '#f1c40f' ? '#2f3640' : '#fff' }}>
            <span style={{fontSize:'20px'}}>#{getOrderNo(order.id)}</span>
            <span style={{fontSize:'16px'}}>{elapsed} 分鐘</span>
          </div>
          <div style={{padding:'10px 15px', background:'#f8f9fa', borderBottom:'1px solid #eee', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <span className="type-badge" style={{background: currentType ==='外送' ? '#9b59b6' : (currentType ==='外帶' ? '#f39c12' : '#1abc9c'), fontSize:'12px'}}>{currentType}</span>
            <span style={{fontSize:'12px', color:'#777'}}>{new Date(order.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
          </div>
          <div className="order-items">
            {(order.items || []).map((item, idx) => (
              <div key={idx} className="kds-item">
                <span className="qty">{item.quantity}</span>
                <span style={{fontWeight:'bold'}}>{item.title || item.name}</span>
                {item.notes && <div style={{fontSize: '14px', color: '#e67e22', marginLeft: '45px', marginTop: '5px'}}>▫️ {item.notes}</div>}
              </div>
            ))}
          </div>
          <div className="card-actions">
            <button className="btn-done" style={{ background: color }} onClick={() => onComplete(order.id)}>完成出餐</button>
          </div>
        </div>
      );
    }

    function LoginOverlay({ onLogin, staffList, branding }) {
      const [pin, setPin] = useState('');
      const [error, setError] = useState('');

      const handleLogin = (digit) => {
        if (digit === 'del') {
          setPin(pin.slice(0, -1));
          setError('');
          return;
        }
        if (pin.length >= 4) return;
        const newPin = pin + digit;
        setPin(newPin);
        
        if (newPin.length === 4) {
          const user = staffList.find(s => s.pin === newPin);
          if (user) {
            onLogin(user);
          } else {
            setError('PIN 碼錯誤，請重新輸入');
            setTimeout(() => setPin(''), 1000);
          }
        }
      };

      return (
        <div style={{position:'fixed', inset:0, background:'linear-gradient(135deg, #2c3e50, #1a1a1a)', zIndex:9999, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', color:'#fff', fontFamily:'"Microsoft JhengHei", sans-serif'}}>
          <img src={branding.logo} style={{width:'80px', height:'80px', borderRadius:'20px', marginBottom:'20px', boxShadow:'0 10px 30px rgba(0,0,0,0.5)'}} />
          <h1 style={{marginBottom:'10px', fontSize:'32px', fontWeight:'900'}}>{branding.name}</h1>
          <p style={{color:'rgba(255,255,255,0.6)', marginBottom:'40px', fontSize:'18px'}}>登入解鎖以開啟系統</p>
          
          <div style={{display:'flex', gap:'20px', marginBottom:'50px'}}>
             {[0,1,2,3].map(i => (
                <div key={i} style={{width:'24px', height:'24px', borderRadius:'50%', border:'2px solid #fff', background: pin.length > i ? '#fff' : 'transparent', transition:'all 0.2s', boxShadow: pin.length > i ? '0 0 15px #fff' : 'none'}}></div>
             ))}
          </div>

          {error && <div style={{color:'#ff4757', marginBottom:'30px', fontWeight:'bold', animation:'shake 0.5s'}}>{error}</div>}

          <div style={{display:'grid', gridTemplateColumns:'repeat(3, 90px)', gap:'25px'}}>
             {[1,2,3,4,5,6,7,8,9].map(n => <button key={n} onClick={() => handleLogin(n.toString())} style={{width:'90px', height:'90px', borderRadius:'50%', border:'1px solid rgba(255,255,255,0.1)', background:'rgba(255,255,255,0.05)', color:'#fff', fontSize:'28px', cursor:'pointer', fontWeight:'bold', transition:'all 0.1s'}} onMouseDown={e=>e.target.style.transform='scale(0.9)'} onMouseUp={e=>e.target.style.transform='scale(1)'}>{n}</button>)}
             <button onClick={() => setPin('')} style={{width:'90px', height:'90px', borderRadius:'50%', border:'none', background:'transparent', color:'#ff4757', fontSize:'20px', cursor:'pointer', fontWeight:'bold'}}>清除</button>
             <button onClick={() => handleLogin('0')} style={{width:'90px', height:'90px', borderRadius:'50%', border:'1px solid rgba(255,255,255,0.1)', background:'rgba(255,255,255,0.05)', color:'#fff', fontSize:'28px', cursor:'pointer', fontWeight:'bold'}} onMouseDown={e=>e.target.style.transform='scale(0.9)'} onMouseUp={e=>e.target.style.transform='scale(1)'}>0</button>
             <button onClick={() => handleLogin('del')} style={{width:'90px', height:'90px', borderRadius:'50%', border:'none', background:'transparent', color:'#eee', fontSize:'28px', cursor:'pointer'}}>←</button>
          </div>
          
          <style>{`
            @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
          `}</style>
        </div>
      );
    }

                    <div className="settings-section">
                      <div className="section-header" style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'25px'}}>
                         <div style={{width:'4px', height:'24px', background:'var(--primary-color)', borderRadius:'2px'}}></div>
                         <h2 style={{margin:0}}>KDS 廚房看板預警時間</h2>
                      </div>
                      <div style={{marginBottom:'20px'}}>
                         <label className="input-label">🟡 警告時間門檻 (分鐘)</label>
                         <input type="number" className="input-field" value={kdsSettings.yellow} onChange={e => setKdsSettings({...kdsSettings, yellow: parseInt(e.target.value)})} />
                         <p style={{color:'#777', fontSize:'14px', marginTop:'8px'}}>當等待時間超過此數值，訂單標題將變為黃色。</p>
                      </div>
                      <div style={{marginBottom:'30px'}}>
                         <label className="input-label">🔴 緊急時間門檻 (分鐘)</label>
                         <input type="number" className="input-field" value={kdsSettings.red} onChange={e => setKdsSettings({...kdsSettings, red: parseInt(e.target.value)})} />
                         <p style={{color:'#777', fontSize:'14px', marginTop:'8px'}}>當等待時間超過此數值，訂單標題將變為紅色。</p>
                      </div>
                      <button onClick={async () => {
                         try {
                           await window.POSDatabase.saveKDSSettings(kdsSettings);
                           showModal('KDS 預警時間儲存成功！');
                         } catch(e) { showModal('儲存失敗：' + e.message, 'error'); }
                      }} className="btn-done" style={{background: 'var(--primary-color)', width:'100%'}}>儲存 KDS 設定</button>
                    </div>
                  )}

                  {settingsSubTab === 'visibility' && (
                    <div className="settings-section">
                      <div className="section-header" style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'25px'}}>
                         <div style={{width:'4px', height:'24px', background:'var(--primary-color)', borderRadius:'2px'}}></div>
                         <h2 style={{margin:0}}>結帳介面顯示設定</h2>
                      </div>
                      <p style={{color:'#777', marginBottom:'25px'}}>切換前台點餐系統中對應欄位是否顯示，若停用則該選項不會出現在點餐流程中。</p>
                      
                      <div style={{marginBottom:'30px'}}>
                         <h3 style={{marginBottom:'15px', fontSize:'18px'}}>🍕 點餐類型 (Order Types)</h3>
                         <div style={{display:'flex', gap:'15px', flexWrap:'wrap'}}>
                            {['內用', '外帶', '外送'].map(type => (
                               <label key={type} style={{display:'flex', alignItems:'center', gap:'10px', background: uiVisibility.types.includes(type) ? 'rgba(76,209,55,0.1)' : '#f8f9fa', padding:'10px 20px', borderRadius:'30px', border: uiVisibility.types.includes(type) ? '2px solid #4cd137' : '2px solid #ddd', cursor:'pointer', transition:'all 0.2s'}}>
                                  <input type="checkbox" style={{display:'none'}} checked={uiVisibility.types.includes(type)} onChange={() => handleToggleVisibility('types', type)} />
                                  <span style={{fontSize:'18px'}}>{type === '內用' ? '🏠' : type === '外帶' ? '🛍️' : '🚲'} {type}</span>
                                  <span style={{color: uiVisibility.types.includes(type) ? '#4cd137' : '#999', fontSize:'14px'}}>{uiVisibility.types.includes(type) ? '✅ 已啟用' : '❌ 已停用'}</span>
                               </label>
                            ))}
                         </div>
                      </div>

                      <div style={{marginBottom:'10px'}}>
                         <h3 style={{marginBottom:'15px', fontSize:'18px'}}>💳 支付方式 (Payment Methods)</h3>
                         <div style={{display:'flex', gap:'15px', flexWrap:'wrap'}}>
                            {['現金', '信用卡', 'LINE Pay'].map(pm => (
                               <label key={pm} style={{display:'flex', alignItems:'center', gap:'10px', background: uiVisibility.payments.includes(pm) ? 'rgba(52,152,219,0.1)' : '#f8f9fa', padding:'10px 20px', borderRadius:'30px', border: uiVisibility.payments.includes(pm) ? '2px solid #3498db' : '2px solid #ddd', cursor:'pointer', transition:'all 0.2s'}}>
                                  <input type="checkbox" style={{display:'none'}} checked={uiVisibility.payments.includes(pm)} onChange={() => handleToggleVisibility('payments', pm)} />
                                  <span style={{fontSize:'18px'}}>{pm === '現金' ? '💵' : pm === '信用卡' ? '💳' : '📱'} {pm}</span>
                                  <span style={{color: pm === '現金' || pm === '信用卡' || pm === 'LINE Pay' ? (uiVisibility.payments.includes(pm) ? '#3498db' : '#999') : '#999', fontSize:'14px'}}>{uiVisibility.payments.includes(pm) ? '✅ 已啟用' : '❌ 已停用'}</span>
                               </label>
                            ))}
                         </div>
                      </div>
                    </div>
                  )}

                  {settingsSubTab === 'icons' && (
                    <div className="settings-section">
                      <div className="section-header" style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'25px'}}>
                         <div style={{width:'4px', height:'24px', background:'var(--primary-color)', borderRadius:'2px'}}></div>
                         <h2 style={{margin:0}}>分類選單圖示管理 (Emojis)</h2>
                      </div>
                      <p style={{color:'#777', marginBottom:'25px'}}>為您的餐點分類設定專屬圖示，若未設定則前台將顯示預設圖示 🍽️。</p>
                      
                      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(180px, 1fr))', gap:'20px', marginBottom:'30px'}}>
                         {computedCategories.map(cat => (
                            <div key={cat} style={{background:'#f8f9fa', padding:'20px', borderRadius:'15px', border:'1px solid #eee', display:'flex', flexDirection:'column', alignItems:'center'}}>
                               <div style={{fontWeight:'bold', marginBottom:'15px', fontSize:'16px', color:'#333'}}>{cat}</div>
                               <div style={{display:'flex', gap:'10px', alignItems:'center', marginBottom:'15px'}}>
                                  <input 
                                    type="text" 
                                    placeholder="輸入" 
                                    value={categoryIcons[cat] || ''} 
                                    onChange={e => setCategoryIcons({...categoryIcons, [cat]: e.target.value})} 
                                    style={{width:'70px', padding:'5px', borderRadius:'10px', border:'2px solid var(--primary-color)', textAlign:'center', fontSize:'28px', background:'#fff'}} 
                                  />
                               </div>
                               <div style={{display:'flex', flexWrap:'wrap', gap:'5px', justifyContent:'center', padding:'10px', background:'#fff', borderRadius:'10px', border:'1px solid #eee'}}>
                                  {(expandedEmojis[cat] ? PRESET_EMOJIS : PRESET_EMOJIS.slice(0, 12)).map(emoji => (
                                     <span 
                                       key={emoji} 
                                       onClick={() => setCategoryIcons({...categoryIcons, [cat]: emoji})}
                                       style={{fontSize:'20px', cursor:'pointer', padding:'5px', borderRadius:'5px', transition:'transform 0.1s'}}
                                       onMouseOver={e => e.currentTarget.style.transform = 'scale(1.3)'}
                                       onMouseOut={e => e.currentTarget.style.transform = 'scale(1)'}
                                     >
                                        {emoji}
                                     </span>
                                  ))}
                                  <button 
                                     onClick={() => setExpandedEmojis({...expandedEmojis, [cat]: !expandedEmojis[cat]})}
                                     style={{width:'100%', padding:'8px', background:'#f0f2f5', border:'none', borderRadius:'8px', marginTop:'5px', cursor:'pointer', color:'#555', fontWeight:'bold', transition:'background 0.2s'}}
                                     onMouseOver={e => e.currentTarget.style.background = '#e4e6e9'}
                                     onMouseOut={e => e.currentTarget.style.background = '#f0f2f5'}
                                  >
                                     {expandedEmojis[cat] ? '收起 🔼' : '顯示更多 🔽'}
                                  </button>
                               </div>
                            </div>
                         ))}
                      </div>

                      <button onClick={handleSaveCategoryIcons} className="btn-done" style={{background: 'var(--primary-color)', width:'100%'}}>儲存圖示設定</button>
                    </div>
                  )}

                  {settingsSubTab === 'branding' && (
                    <div className="settings-section">
                      <div className="section-header" style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'25px'}}>
                         <div style={{width:'4px', height:'24px', background:'var(--primary-color)', borderRadius:'2px'}}></div>
                         <h2 style={{margin:0}}>品牌視覺設定 (Branding)</h2>
                      </div>
                      <p style={{color:'#777', marginBottom:'25px'}}>更換您的餐廳名稱與 Logo 圖示，這將同步顯示在點餐前台與管理後台的側邊欄。</p>
                      
                      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'30px', marginBottom:'30px'}}>
                         <div>
                            <div style={{marginBottom:'20px'}}>
                               <label className="input-label">🏆 餐廳名稱 (Restaurant Name)</label>
                               <input 
                                 type="text" 
                                 className="input-field" 
                                 value={branding.name} 
                                 onChange={e => setBranding({...branding, name: e.target.value})} 
                                 placeholder="例如：德上快餐店"
                               />
                            </div>
                            <div style={{marginBottom:'20px'}}>
                               <label className="input-label">🖼️ Logo 圖片網址 (Logo URL)</label>
                               <input 
                                 type="text" 
                                 className="input-field" 
                                 value={branding.logo} 
                                 onChange={e => setBranding({...branding, logo: e.target.value})} 
                                 placeholder="請輸入圖片連結 (HTTPS)"
                               />
                               <p style={{color:'#999', fontSize:'12px', marginTop:'8px'}}>建議使用正方形、透明背景的圖片 (PNG/WebP)。</p>
                            </div>
                         </div>
                         
                         <div style={{background:'#f8f9fa', padding:'25px', borderRadius:'15px', border:'1px dashed #ddd', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center'}}>
                            <div style={{fontSize:'13px', color:'#999', marginBottom:'20px', fontWeight:'bold'}}>即時預覽 (Sidebar Preview)</div>
                            <div style={{background:'#fff', padding:'15px 25px', borderRadius:'12px', boxShadow:'0 4px 10px rgba(0,0,0,0.05)', display:'flex', alignItems:'center', gap:'12px'}}>
                               {branding.logo 
                                 ? <img src={branding.logo} style={{width:'45px', height:'45px', borderRadius:'8px', objectFit:'cover', background:'#eee'}} />
                                 : <span style={{fontSize:'36px'}}>🍟</span>
                               }
                               <span style={{fontSize:'20px', fontWeight:'bold', color:'var(--primary-color)'}}>{branding.name || '德上 POS'}</span>
                            </div>
                         </div>
                      </div>

                      <button onClick={handleSaveBranding} className="btn-done" style={{background: 'var(--primary-color)', width:'100%'}}>儲存品牌設定</button>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>

          {confirmReturnOrder && (
             <div style={{position:'fixed', top:0, left:0, width:'100%', height:'100%', background:'rgba(0,0,0,0.5)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:9999}}>
               <div style={{background:'#fff', padding:'40px', borderRadius:'20px', width:'90%', maxWidth:'450px', boxShadow:'0 15px 35px rgba(0,0,0,0.2)', textAlign:'center', animation:'fadeIn 0.2s'}}>
                  <div style={{fontSize:'50px', marginBottom:'15px'}}>⚠️</div>
                  <h2 style={{color:'#2c3e50', marginBottom:'15px', border:'none', padding:0}}>退回廚房確認</h2>
                  <p style={{color:'#555', fontSize:'18px', marginBottom:'30px', lineHeight:'1.6'}}>
                    確定要將單號 <strong style={{color:'#e74c3c', fontSize:'22px'}}>{getOrderNo(confirmReturnOrder.id)}</strong><br/>退回廚房重新製作嗎？<br/><br/>
                    <span style={{fontSize:'15px', color:'#7f8ca6'}}>按下確認後，此訂單將會重新回到<br/>「KDS 廚房看板」的等候製作區中排隊。</span>
                  </p>
                  <div style={{display:'flex', gap:'15px'}}>
                    <button 
                      onClick={(e) => { e.stopPropagation(); setConfirmReturnOrder(null); }} 
                      style={{flex:1, padding:'15px', background:'#f1f2f6', color:'#2f3640', border:'none', borderRadius:'12px', fontSize:'18px', fontWeight:'bold', cursor:'pointer', transition:'background 0.2s'}}
                    >取消</button>
                    <button 
                      onClick={(e) => {
                        e.stopPropagation();
                        window.POSDatabase.updateOrderStatus(confirmReturnOrder.id, 'pending');
                        setConfirmReturnOrder(null);
                      }} 
                      style={{flex:1, padding:'15px', background:'#e74c3c', color:'#fff', border:'none', borderRadius:'12px', fontSize:'18px', fontWeight:'bold', cursor:'pointer', transition:'background 0.2s', boxShadow:'0 4px 10px rgba(231,76,60,0.2)'}}
                    >確認退回</button>
                  </div>
               </div>
             </div>
          )}

          {adminModal && (
             <div style={{position:'fixed', top:0, left:0, width:'100%', height:'100%', background:'rgba(0,0,0,0.6)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:10000}}>
               <div style={{background:'#fff', padding:'40px', borderRadius:'24px', width:'90%', maxWidth:'420px', boxShadow:'0 20px 50px rgba(0,0,0,0.3)', textAlign:'center', animation:'fadeIn 0.25s'}}>
                  <div style={{fontSize:'64px', marginBottom:'20px'}}>
                    {adminModal.type === 'error' ? '❌' : adminModal.type === 'warning' ? '⚠️' : '✅'}
                  </div>
                  <h2 style={{color:'#2f3640', marginBottom:'15px', border:'none', padding:0, fontSize:'24px'}}>{adminModal.title}</h2>
                  <p style={{color:'#7f8c8d', fontSize:'18px', marginBottom:'35px', lineHeight:'1.5'}}>{adminModal.msg}</p>
                  
                  <div style={{display:'flex', gap:'15px'}}>
                    {adminModal.onConfirm ? (
                      <>
                        <button 
                          onClick={() => setAdminModal(null)} 
                          style={{flex:1, padding:'16px', background:'#f1f2f6', color:'#2f3640', border:'none', borderRadius:'14px', fontSize:'18px', fontWeight:'bold', cursor:'pointer'}}
                        >取消</button>
                        <button 
                          onClick={() => { adminModal.onConfirm(); setAdminModal(null); }} 
                          style={{flex:1, padding:'16px', background: adminModal.type === 'warning' ? '#e74c3c' : 'var(--primary-color)', color:'#fff', border:'none', borderRadius:'14px', fontSize:'18px', fontWeight:'bold', cursor:'pointer', boxShadow:'0 4px 15px rgba(0,0,0,0.1)'}}
                        >確定</button>
                      </>
                    ) : (
                      <button 
                        onClick={() => setAdminModal(null)} 
                        style={{width:'100%', padding:'16px', background:'var(--primary-color)', color:'#fff', border:'none', borderRadius:'14px', fontSize:'18px', fontWeight:'bold', cursor:'pointer', boxShadow:'0 4px 15px rgba(0,0,0,0.1)'}}
                      >我知道了</button>
                    )}
                  </div>
               </div>
             </div>
          )}

        </div>
        </React.Fragment>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AdminApp />);
  </script>
</body>
</html>
