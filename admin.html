<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS 後台與 KDS 廚房看板</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    window.POSDatabase = (function() {
      const firebaseConfig = { apiKey: "AIzaSyDTsrdVcwm7mi2aGoexNG4QqcEyn6JFqpw", authDomain: "project-a60e1765-a61e-40db-82e.firebaseapp.com", projectId: "project-a60e1765-a61e-40db-82e" };
      let dbMode = 'local', dbInstance = null;
      if (firebaseConfig.apiKey && typeof firebase !== 'undefined') {
        try { if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); dbInstance = firebase.firestore(); dbMode = 'firebase'; } catch(e) { console.error(e); }
      }
      const saveOrder = async (orderInfo) => {
        const newOrder = { ...orderInfo, status: 'pending', createdAt: new Date().toISOString() };
        if (dbMode === 'firebase') await dbInstance.collection('orders').add(newOrder);
      };
      const updateOrderStatus = async (orderId, status) => {
        if (dbMode === 'firebase') await dbInstance.collection('orders').doc(orderId).update({ status });
      };
      const subscribeToOrders = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('orders').orderBy('createdAt', 'desc').onSnapshot((s) => callback(s.docs.map(doc => ({ ...doc.data(), id: doc.id }))));
      };
      const getMenu = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('menu_items').onSnapshot((s) => callback(s.docs.map(doc => ({ ...doc.data(), id: doc.id }))));
      };
      const saveMenuItem = async (item) => {
        const data = { ...item }; let id = data.id; delete data.id;
        if (dbMode === 'firebase') { if(id) await dbInstance.collection('menu_items').doc(String(id)).update(data); else await dbInstance.collection('menu_items').add(data); }
      };
      const deleteMenuItem = async (id) => { if (dbMode === 'firebase') await dbInstance.collection('menu_items').doc(id).delete(); };
      const importDefaultMenu = async (defaultItems) => {
        if (dbMode === 'firebase') { const batch = dbInstance.batch(); defaultItems.forEach(item => batch.set(dbInstance.collection('menu_items').doc(item.id.toString()), item)); await batch.commit(); }
      };
      return { saveOrder, updateOrderStatus, subscribeToOrders, getMenu, saveMenuItem, deleteMenuItem, importDefaultMenu };
    })();
  </script>
  <style>
    .admin-layout { display: flex; height: 100vh; width: 100vw; background: #f5f6fa; overflow: hidden; }
    .kds-container { flex: 1; padding: 20px 40px; overflow-y: auto; }
    .nav-item { padding: 15px 20px; font-size: 18px; font-weight: bold; color: #555; cursor: pointer; border-radius: 8px; margin-bottom: 10px; transition: all 0.2s; }
    .nav-item:hover { background: #e1e5ee; }
    .nav-item.active { background: var(--primary-color); color: #fff; }
    .order-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .order-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column; }
    .order-card-header { background: #f75c03; color: #fff; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
    .order-card-header.completed { background: #4cd137; }
    .order-summary { font-size: 24px; }
    .order-items { padding: 15px; flex: 1; min-height: 150px; background: #fafafa; }
    .kds-item { margin-bottom: 12px; font-size: 18px; border-bottom: 1px dashed #e1e1e1; padding-bottom: 12px; }
    .qty { font-weight: bold; color: var(--primary-color); font-size: 22px; margin-right: 15px; background: #fff3ed; padding: 2px 10px; border-radius: 8px; }
    .card-actions { padding: 15px; border-top: 1px solid #f0f0f0; background: #fff; }
    .btn-done { width: 100%; padding: 16px; background: #4cd137; color: #fff; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    .dashboard { display: flex; gap: 30px; margin-bottom: 30px; flex-wrap: wrap; }
    .stat-card { background: #fff; padding: 30px; border-radius: 12px; flex: 1; text-align: center; }
    .stat-value { font-size: 48px; font-weight: bold; color: var(--primary-color); margin-top: 15px; }
    h2 { font-size: 28px; color: #2f3640; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px;}
    .input-field { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    .input-label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const defaultMenuData = [
      { id: 1, name: '經典牛肉堡', price: 120, category: 'burger', image: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: false },
      { id: 2, name: '雙層起司堡', price: 150, category: 'burger', image: 'https://images.unsplash.com/photo-1586816001966-79b736744398?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: false },
      { id: 3, name: '脆皮炸雞', price: 60, category: 'snack', image: 'https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: false },
      { id: 4, name: '黃金脆薯', price: 50, category: 'snack', image: 'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: false },
      { id: 5, name: '可口可樂', price: 40, category: 'drink', image: 'https://images.unsplash.com/photo-1622483767028-3f66f32aef97?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: true },
      { id: 6, name: '冰紅茶', price: 35, category: 'drink', image: 'https://images.unsplash.com/photo-1556679343-c7306c1976bc?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: true },
      { id: 7, name: '經典套餐', price: 200, category: 'combo', image: 'https://images.unsplash.com/photo-1610614819515-6899ba89e5fc?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: false }
    ];

    function AdminApp() {
      const { useState, useEffect, useMemo } = React;
      const categoryLabelMap = { burger: '漢堡', snack: '點心', drink: '飲料', combo: '套餐' };
      
      const [activeTab, setActiveTab] = useState('kds');
      const [orders, setOrders] = useState([]);
      const [menuItems, setMenuItems] = useState([]);
      const [editingItem, setEditingItem] = useState(null);

      useEffect(() => {
        const unsubOrders = window.POSDatabase.subscribeToOrders((data) => setOrders(data || []));
        const unsubMenu = window.POSDatabase.getMenu((data) => setMenuItems(data || []));
        return () => { unsubOrders(); unsubMenu(); };
      }, []);

      const getOrderNo = (id) => (id || '').includes('-') ? id.split('-')[1] : (id || '').substring(0, 6);
      const pendingOrders = orders.filter(o => o.status === 'pending');
      const completedOrders = orders.filter(o => o.status === 'completed');
      const todayTotal = orders.reduce((sum, order) => sum + (order.totalAmount || 0), 0);

      const handleSaveMenu = async () => {
        if (!editingItem.name || !editingItem.image || editingItem.price <= 0) {
           alert("備註：餐點名稱、圖片網址為必填，且價格必須大於 0！");
           return;
        }
        try {
           await window.POSDatabase.saveMenuItem(editingItem);
           alert("儲存成功！");
           setEditingItem(null);
        } catch(e) {
           alert("Firebase 儲存失敗：" + e.message);
        }
      };

      return (
        <div className="admin-layout">
          <div className="side-nav" style={{width: '250px', background:'#fff', padding:'20px', display:'flex', flexDirection:'column'}}>
            <div style={{ color: '#2f3640', fontSize: '20px', fontWeight:'bold', marginBottom:'30px' }}>管理後台 & KDS</div>
            <div className={`nav-item ${activeTab === 'kds' ? 'active' : ''}`} onClick={() => setActiveTab('kds')}>廚房看板 ({pendingOrders.length})</div>
            <div className={`nav-item ${activeTab === 'menu' ? 'active' : ''}`} onClick={() => setActiveTab('menu')}>菜單管理</div>
            <div className={`nav-item ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => setActiveTab('dashboard')}>今日營業額</div>
            <div className={`nav-item ${activeTab === 'history' ? 'active' : ''}`} onClick={() => setActiveTab('history')}>出餐紀錄</div>
            <div style={{ marginTop: 'auto' }}>
              <a href="index.html" target="_blank" className="nav-item" style={{display: 'block', textDecoration: 'none', color: '#ff4757', border: '1px solid #ffeaa7'}}>返回前台 🍔</a>
            </div>
          </div>
          <div className="kds-container">
            {activeTab === 'kds' && (
              <div>
                <h2>等待製作 ({pendingOrders.length})</h2>
                <div className="order-grid">
                  {pendingOrders.map(order => (
                    <div key={order.id} className="order-card">
                      <div className="order-card-header">
                        <span className="order-summary">單號: {getOrderNo(order.id)}</span>
                      </div>
                      <div className="order-items">
                        {(order.items || []).map((item, idx) => (
                           <div key={item.id || idx} className="kds-item">
                             <span className="qty">{item.quantity || 1}</span> {item.title || item.name}
                           </div>
                        ))}
                      </div>
                      <div className="card-actions">
                        <button className="btn-done" onClick={() => window.POSDatabase.updateOrderStatus(order.id, 'completed')}>完成出餐</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {activeTab === 'menu' && (
              <div>
                <div style={{display:'flex', justifyContent:'space-between', borderBottom:'2px solid #eee', paddingBottom:'15px', marginBottom:'20px'}}>
                   <h2 style={{border:'none', margin:0}}>菜單管理系統</h2>
                   <button onClick={() => setEditingItem({name:'', price:0, category:'', image:'', hasOptions:false, customOptions:''})} style={{padding:'10px 20px', background:'var(--primary-color)', color:'#fff', border:'none', borderRadius:'8px', cursor:'pointer', fontWeight:'bold'}}>＋ 新增餐點</button>
                </div>
                {menuItems.length === 0 && !editingItem && (
                   <div style={{padding:'50px', textAlign:'center', background:'#fff', borderRadius:'12px'}}>
                     <h3 style={{color:'#777'}}>目前資料庫中沒有任何餐點</h3>
                     <button onClick={() => window.POSDatabase.importDefaultMenu(defaultMenuData)} style={{marginTop:'15px', padding:'15px 30px', background:'#4cd137', color:'#fff', border:'none', borderRadius:'8px', cursor:'pointer', fontSize:'18px'}}>一鍵匯入預設菜單範例</button>
                   </div>
                )}
                {editingItem ? (
                   <div style={{background:'#fff', padding:'30px', borderRadius:'12px', maxWidth:'600px', margin:'0 auto'}}>
                     <h3>{editingItem.id ? '編輯餐點' : '新增餐點'}</h3>
                     <div>
                        <div style={{marginBottom:'15px'}}>
                           <label className="input-label">餐點名稱</label>
                           <input className="input-field" value={editingItem.name} onChange={e=>setEditingItem({...editingItem, name: e.target.value})} />
                        </div>
                        <div style={{marginBottom:'15px'}}>
                           <label className="input-label" style={{display:'flex', justifyContent:'space-between'}}>
                             <span>餐點分類 (可選單或自創新分類)</span>
                           </label>
                           <input 
                             className="input-field" 
                             list="category-options" 
                             placeholder="例如：漢堡、飲料、或自行輸入新分類如：熱炒" 
                             value={editingItem.category} 
                             onChange={e=>setEditingItem({...editingItem, category: e.target.value})} 
                           />
                           <datalist id="category-options">
                              <option value="漢堡" />
                              <option value="點心" />
                              <option value="飲料" />
                              <option value="套餐" />
                              {Array.from(new Set(menuItems.map(i => categoryLabelMap[i.category] || i.category))).map(cat => (
                                 !['漢堡','點心','飲料','套餐','burger','snack','drink','combo'].includes(cat) && <option key={cat} value={cat} />
                              ))}
                           </datalist>
                        </div>
                        <div style={{marginBottom:'15px'}}>
                           <label className="input-label">販售價格</label>
                           <input type="number" className="input-field" value={editingItem.price} onChange={e=>setEditingItem({...editingItem, price: Number(e.target.value)})} />
                        </div>
                        <div style={{marginBottom:'15px'}}>
                           <label className="input-label">圖片網址 (URL)</label>
                           <input className="input-field" value={editingItem.image} onChange={e=>setEditingItem({...editingItem, image: e.target.value})} />
                           {editingItem.image && <img src={editingItem.image} style={{marginTop:'10px', width:'80px', height:'80px', objectFit:'cover', borderRadius:'8px'}} />}
                        </div>
                        <div style={{marginBottom:'25px'}}>
                           <label className="input-label">客製化標籤選項 (多個請用逗號分隔)</label>
                           <input className="input-field" placeholder="例如：不要生菜, 加辣, 去冰, 半糖" value={editingItem.customOptions || ''} onChange={e=>setEditingItem({...editingItem, customOptions: e.target.value})} />
                           <div style={{fontSize:'13px', color:'#777', marginTop:'5px'}}>若不需客製化選項，請留空即可。結帳時客人可複選這些標籤。</div>
                        </div>
                        <div style={{display:'flex', gap:'15px'}}>
                           <button type="button" onClick={handleSaveMenu} className="btn-done" style={{flex:2}}>儲存</button>
                           <button type="button" onClick={()=>setEditingItem(null)} style={{flex:1, background:'#ddd', cursor:'pointer', border:'none', borderRadius:'8px', fontWeight:'bold'}}>取消</button>
                        </div>
                     </div>
                   </div>
                ) : (
                   <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(350px, 1fr))', gap:'20px'}}>
                     {menuItems.map(item => (
                        <div key={item.id} style={{background:'#fff', borderRadius:'12px', padding:'15px', display:'flex', gap:'15px', alignItems:'center'}}>
                           <img src={item.image} style={{width:'80px', height:'80px', objectFit:'cover', borderRadius:'8px'}} />
                           <div style={{flex:1}}>
                              <div style={{fontWeight:'bold', fontSize:'20px'}}>{item.name}</div>
                              <div style={{color:'var(--primary-color)', fontWeight:'bold'}}>${item.price}</div>
                              <div style={{color:'#777', fontSize:'14px'}}>{categoryLabelMap[item.category] || item.category} {(item.hasOptions || item.customOptions) && <span style={{color:'var(--primary-color)'}}>✨客製化</span>}</div>
                           </div>
                           <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                              <button onClick={() => setEditingItem({...item, category: categoryLabelMap[item.category] || item.category})} style={{padding:'8px 15px', background:'#f1f2f6', border:'none', borderRadius:'6px', cursor:'pointer'}}>編輯</button>
                              <button onClick={()=>{if(confirm('確定刪除？')) window.POSDatabase.deleteMenuItem(item.id)}} style={{padding:'8px 15px', background:'#ff6b81', color:'#fff', border:'none', borderRadius:'6px', cursor:'pointer'}}>刪除</button>
                           </div>
                        </div>
                     ))}
                   </div>
                )}
              </div>
            )}
            {activeTab === 'dashboard' && (
              <div>
                <h2>今日營業概況</h2>
                <div className="dashboard">
                  <div className="stat-card">
                    <div style={{color: '#777'}}>總接單數</div>
                    <div className="stat-value">{orders.length} 筆</div>
                  </div>
                  <div className="stat-card">
                    <div style={{color: '#777'}}>今日累積營業額</div>
                    <div className="stat-value">${todayTotal.toLocaleString()}</div>
                  </div>
                </div>
              </div>
            )}
            {activeTab === 'history' && (
              <div>
                <h2>歷史訂單 (已完成出餐)</h2>
                <div className="order-grid">
                  {completedOrders.map(order => (
                    <div key={order.id} className="order-card">
                      <div className="order-card-header completed">
                        <span className="order-summary">單號: {getOrderNo(order.id)}</span>
                        <span style={{opacity: 0.8}}>${order.totalAmount || 0}</span>
                      </div>
                      <div className="card-actions">
                        <button className="btn-done btn-undo" style={{background:'#7f8fa6'}} onClick={() => window.POSDatabase.updateOrderStatus(order.id, 'pending')}>退回廚房</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AdminApp />);
  </script>
</body>
</html>
