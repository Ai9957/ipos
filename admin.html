<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS 後台與 KDS 廚房看板</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    window.POSDatabase = (function() {
      const firebaseConfig = { apiKey: "AIzaSyDTsrdVcwm7mi2aGoexNG4QqcEyn6JFqpw", authDomain: "project-a60e1765-a61e-40db-82e.firebaseapp.com", projectId: "project-a60e1765-a61e-40db-82e" };
      let dbMode = 'local', dbInstance = null;
      if (firebaseConfig.apiKey && typeof firebase !== 'undefined') {
        try { if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); dbInstance = firebase.firestore(); dbMode = 'firebase'; } catch(e) { console.error(e); }
      }
      const saveOrder = async (orderInfo) => {
        const newOrder = { ...orderInfo, status: 'pending', createdAt: new Date().toISOString() };
        if (dbMode === 'firebase') await dbInstance.collection('orders').add(newOrder);
      };
      const updateOrderStatus = async (orderId, status) => {
        const updateData = { status };
        if (status === 'completed') updateData.completedAt = new Date().toISOString();
        if (dbMode === 'firebase') await dbInstance.collection('orders').doc(orderId).update(updateData);
      };
      const subscribeToOrders = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('orders').orderBy('createdAt', 'desc').onSnapshot((s) => callback(s.docs.map(doc => ({ ...doc.data(), id: doc.id }))));
      };
      const getMenu = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('menu_items').onSnapshot((s) => callback(s.docs.map(doc => ({ ...doc.data(), id: doc.id }))));
      };
      const getCategoryOrder = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('category_order').onSnapshot((s) => callback(s.exists ? (s.data().order || []) : []));
      };
      const saveCategoryOrder = async (orderArr) => {
        if (dbMode === 'firebase') await dbInstance.collection('settings').doc('category_order').set({ order: orderArr });
      };
      const getItemOrders = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('item_orders').onSnapshot((s) => callback(s.exists ? s.data() : {}));
      };
      const saveItemOrders = async (ordersObj) => {
        if (dbMode === 'firebase') await dbInstance.collection('settings').doc('item_orders').set(ordersObj);
      };
      const getKDSSettings = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('kds_settings').onSnapshot((s) => callback(s.exists ? s.data() : { yellow: 5, red: 10 }));
      };
      const saveKDSSettings = async (settings) => {
        if (dbMode === 'firebase') await dbInstance.collection('settings').doc('kds_settings').set(settings);
      };
      const saveMenuItem = async (item) => {
        const data = { ...item }; let id = data.id; delete data.id;
        if (dbMode === 'firebase') { if(id) await dbInstance.collection('menu_items').doc(String(id)).update(data); else await dbInstance.collection('menu_items').add(data); }
      };
      const deleteMenuItem = async (id) => { if (dbMode === 'firebase') await dbInstance.collection('menu_items').doc(id).delete(); };
      const importDefaultMenu = async (defaultItems) => {
        if (dbMode === 'firebase') { const batch = dbInstance.batch(); defaultItems.forEach(item => batch.set(dbInstance.collection('menu_items').doc(item.id.toString()), item)); await batch.commit(); }
      };
      return { saveOrder, updateOrderStatus, subscribeToOrders, getMenu, getCategoryOrder, saveCategoryOrder, getItemOrders, saveItemOrders, getKDSSettings, saveKDSSettings, saveMenuItem, deleteMenuItem, importDefaultMenu };
    })();
  </script>
  <style>
    .admin-layout { display: flex; height: 100vh; width: 100vw; background: #f5f6fa; overflow: hidden; }
    .kds-container { flex: 1; padding: 20px 40px; overflow-y: auto; position: relative; }
    .nav-item { padding: 15px 20px; font-size: 18px; font-weight: bold; color: #555; cursor: pointer; border-radius: 8px; margin-bottom: 10px; transition: all 0.2s; }
    .nav-item:hover { background: #e1e5ee; }
    .nav-item.active { background: var(--primary-color); color: #fff; }
    .order-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .order-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s; }
    .order-card-header { color: #fff; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
    .order-card-header.completed { background: #4cd137; }
    .order-summary { font-size: 24px; }
    .order-items { padding: 15px; flex: 1; min-height: 150px; background: #fafafa; }
    .kds-item { margin-bottom: 12px; font-size: 18px; border-bottom: 1px dashed #e1e1e1; padding-bottom: 12px; }
    .qty { font-weight: bold; color: var(--primary-color); font-size: 22px; margin-right: 15px; background: #fff3ed; padding: 2px 10px; border-radius: 8px; }
    .card-actions { padding: 15px; border-top: 1px solid #f0f0f0; background: #fff; }
    .btn-done { width: 100%; padding: 16px; color: #fff; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    .dashboard { display: flex; gap: 30px; margin-bottom: 30px; flex-wrap: wrap; }
    .stat-card { background: #fff; padding: 30px; border-radius: 12px; flex: 1; text-align: center; }
    .stat-value { font-size: 48px; font-weight: bold; color: var(--primary-color); margin-top: 15px; }
    h2 { font-size: 28px; color: #2f3640; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px;}
    .input-field { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    .input-label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
    .sound-toggle { position: absolute; top: 20px; right: 40px; background: #fff; border: 2px solid #2ed573; padding: 10px 25px; border-radius: 30px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; transition: all 0.2s; }
    .sound-toggle.muted { border-color: #dcdde1; color: #7f8c8d; }
  </style>
</head>
<body onClick="(() => { const a = document.getElementById('orderAudio'); if(a && a.paused) { a.muted = true; a.play().then(() => { a.pause(); a.muted = false; console.log('Audio unlocked'); }).catch(() => {}); } })()">
  <audio id="orderAudio" src="order.mp3" preload="auto"></audio>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    const defaultMenuData = [
      { id: 1, name: '經典牛肉堡', price: 120, category: 'burger', image: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: false },
      { id: 2, name: '雙層起司堡', price: 150, category: 'burger', image: 'https://images.unsplash.com/photo-1586816001966-79b736744398?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: false },
      { id: 3, name: '脆皮炸雞', price: 60, category: 'snack', image: 'https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: false },
      { id: 4, name: '黃金脆薯', price: 50, category: 'snack', image: 'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: false },
      { id: 5, name: '可口可樂', price: 40, category: 'drink', image: 'https://images.unsplash.com/photo-1622483767028-3f66f32aef97?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: true },
      { id: 6, name: '冰紅茶', price: 35, category: 'drink', image: 'https://images.unsplash.com/photo-1556679343-c7306c1976bc?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: true },
      { id: 7, name: '經典套餐', price: 200, category: 'combo', image: 'https://images.unsplash.com/photo-1610614819515-6899ba89e5fc?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: false }
    ];

    function OrderCard({ order, onComplete, getOrderNo, kdsSettings }) {
      const { useState, useEffect } = React;
      const [elapsed, setElapsed] = useState(0);

      const yellowThreshold = kdsSettings?.yellow || 5;
      const redThreshold = kdsSettings?.red || 10;

      useEffect(() => {
        const calc = () => {
          const start = new Date(order.createdAt).getTime();
          setElapsed(Math.floor((Date.now() - start) / 60000));
        };
        calc();
        const tid = setInterval(calc, 10000);
        return () => clearInterval(tid);
      }, [order.createdAt]);

      let color = '#2ed573'; // default green
      if (elapsed >= redThreshold) color = '#ff4757'; // urgent: red
      else if (elapsed >= yellowThreshold) color = '#ffa502'; // warning: yellow

      return (
        <div className="order-card" style={{ border: `2px solid ${color}` }}>
          <div className="order-card-header" style={{ background: color, display:'flex', flexDirection:'column', alignItems:'flex-start', padding:'10px 15px' }}>
            <div style={{ display:'flex', justifyContent:'space-between', width:'100%', alignItems:'center' }}>
              <span className="order-summary">單號: {getOrderNo(order.id)}</span>
              <span style={{ fontSize:'14px', opacity:0.9 }}>{new Date(order.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} 入單</span>
            </div>
            <div style={{ fontSize:'16px', fontWeight:'bold', marginTop:'5px' }}>已等候 {elapsed} 分鐘</div>
          </div>
          <div className="order-items">
            {(order.items || []).map((item, idx) => (
               <div key={item.id || idx} className="kds-item">
                 <span className="qty">{item.quantity || 1}</span> {item.title || item.name}
               </div>
            ))}
          </div>
          <div className="card-actions">
            <button className="btn-done" style={{ background: color }} onClick={() => onComplete(order.id)}>完成出餐</button>
          </div>
        </div>
      );
    }

    function AdminApp() {
      const categoryLabelMap = { burger: '漢堡', snack: '點心', drink: '飲料', combo: '套餐' };
      
      const [activeTab, setActiveTab] = useState('kds');
      const [orders, setOrders] = useState([]);
      const [menuItems, setMenuItems] = useState([]);
      const [editingItem, setEditingItem] = useState(null);
      const [originalItem, setOriginalItem] = useState(null);
      const [categoryOrder, setCategoryOrder] = useState([]);
      const [locallySortedCategories, setLocallySortedCategories] = useState([]);
      const [filterCategory, setFilterCategory] = useState('all');
      const [itemOrders, setItemOrders] = useState({});
      const [selectedSortCategory, setSelectedSortCategory] = useState('');
      const [kdsSettings, setKdsSettings] = useState({ yellow: 5, red: 10 });
      const [isMuted, setIsMuted] = useState(false);
      
      const prevOrderCountRef = useRef(0);
      const isInitialLoadRef = useRef(true);

      useEffect(() => {
        const unsub = window.POSDatabase.getCategoryOrder(setCategoryOrder);
        const unsubItemOrders = window.POSDatabase.getItemOrders(setItemOrders);
        const unsubKDSSettings = window.POSDatabase.getKDSSettings(setKdsSettings);
        return () => { 
          unsub && unsub(); 
          unsubItemOrders && unsubItemOrders(); 
          unsubKDSSettings && unsubKDSSettings();
        };
      }, []);

      const computedCategories = useMemo(() => {
        return Array.from(new Set(menuItems.map(item => categoryLabelMap[item.category] || item.category).filter(Boolean)));
      }, [menuItems]);

      useEffect(() => {
          const sorted = [...computedCategories].sort((a,b) => {
             let ia = categoryOrder.indexOf(a), ib = categoryOrder.indexOf(b);
             if(ia===-1) ia=999; if(ib===-1) ib=999;
             return ia - ib;
          });
          setLocallySortedCategories(sorted);
          if(!selectedSortCategory && sorted.length > 0) setSelectedSortCategory(sorted[0]);
      }, [computedCategories, categoryOrder]);

      const moveCategory = (index, direction) => {
         const newList = [...locallySortedCategories];
         const temp = newList[index];
         newList[index] = newList[index + direction];
         newList[index + direction] = temp;
         setLocallySortedCategories(newList);
      };

      const handleSaveCategoryOrder = async () => {
         try {
           await window.POSDatabase.saveCategoryOrder(locallySortedCategories);
           alert('分類排序儲存成功！');
         } catch(e) {
           alert('儲存失敗：' + e.message);
         }
      };

      const handleSaveItemOrder = async (catName, sortedIds) => {
          try {
            const newOrders = { ...itemOrders, [catName]: sortedIds };
            await window.POSDatabase.saveItemOrders(newOrders);
            alert(`「${catName}」商品排序儲存成功！`);
          } catch(e) {
            alert('儲存失敗：' + e.message);
          }
      };

      useEffect(() => {
        const unsubOrders = window.POSDatabase.subscribeToOrders((data) => {
          const currentData = data || [];
          const pending = currentData.filter(o => o.status === 'pending');
          
          if (!isInitialLoadRef.current && pending.length > prevOrderCountRef.current) {
            if (!isMuted) {
              const audio = document.getElementById('orderAudio');
              if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.warn('Audio play blocked:', e));
              }
            }
          }
          isInitialLoadRef.current = false;
          prevOrderCountRef.current = pending.length;
          setOrders(currentData);
        });
        const unsubMenu = window.POSDatabase.getMenu((data) => setMenuItems(data || []));
        return () => { unsubOrders(); unsubMenu(); };
      }, [isMuted]);

      const getOrderNo = (id) => (id || '').includes('-') ? id.split('-')[1] : (id || '').substring(0, 6);
      const pendingOrders = orders.filter(o => o.status === 'pending');
      const completedOrders = orders.filter(o => o.status === 'completed');
      const todayTotal = orders.reduce((sum, order) => sum + (order.totalAmount || 0), 0);

      const handleSaveMenu = async () => {
        if (!editingItem.name || !editingItem.image || editingItem.price <= 0) {
           alert("備註：餐點名稱、圖片網址為必填，且價格必須大於 0！");
           return;
        }
        try {
           await window.POSDatabase.saveMenuItem(editingItem);
           alert("儲存成功！");
           setEditingItem(null);
           setOriginalItem(null);
        } catch(e) {
           alert("Firebase 儲存失敗：" + e.message);
        }
      };

      const isDirty = originalItem && editingItem && originalItem !== JSON.stringify(editingItem);

      const handleSaveKDSSettings = async () => {
          try {
             await window.POSDatabase.saveKDSSettings(kdsSettings);
             alert('KDS 預警時間儲存成功！');
          } catch(e) {
             alert('儲存失敗：' + e.message);
          }
      };

      return (
        <div className="admin-layout">
          <div className="side-nav" style={{width: '250px', background:'#fff', padding:'20px', display:'flex', flexDirection:'column'}}>
            <div style={{ color: '#2f3640', fontSize: '20px', fontWeight:'bold', marginBottom:'30px' }}>管理後台 & KDS</div>
            <div className={`nav-item ${activeTab === 'kds' ? 'active' : ''}`} onClick={() => setActiveTab('kds')}>廚房看板 ({pendingOrders.length})</div>
            <div className={`nav-item ${activeTab === 'menu' ? 'active' : ''}`} onClick={() => setActiveTab('menu')}>菜單管理</div>
            <div className={`nav-item ${activeTab === 'categories' ? 'active' : ''}`} onClick={() => setActiveTab('categories')}>排序管理</div>
            <div className={`nav-item ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => setActiveTab('dashboard')}>今日營業額</div>
            <div className={`nav-item ${activeTab === 'history' ? 'active' : ''}`} onClick={() => setActiveTab('history')}>出餐紀錄</div>
            <div className={`nav-item ${activeTab === 'settings' ? 'active' : ''}`} onClick={() => setActiveTab('settings')}>系統設定 ⚙️</div>
            <div style={{ marginTop: 'auto' }}>
              <a href="index.html" target="_blank" className="nav-item" style={{display: 'block', textDecoration: 'none', color: '#ff4757', border: '1px solid #ffeaa7'}}>返回前台 🍔</a>
            </div>
          </div>
          <div className="kds-container">
            {activeTab === 'kds' && (
              <div className={`sound-toggle ${isMuted ? 'muted' : ''}`} onClick={() => setIsMuted(!isMuted)}>
                <span style={{fontSize:'20px'}}>{isMuted ? '🔇' : '🔊'}</span>
                <span>{isMuted ? '提示音：靜音中' : '提示音：已開啟'}</span>
              </div>
            )}
            {activeTab === 'kds' && (
              <div>
                <h2>等待製作 ({pendingOrders.length})</h2>
                <div className="order-grid">
                  {pendingOrders.map(order => (
                    <OrderCard 
                      key={order.id} 
                      order={order} 
                      getOrderNo={getOrderNo} 
                      kdsSettings={kdsSettings}
                      onComplete={(id) => window.POSDatabase.updateOrderStatus(id, 'completed')} 
                    />
                  ))}
                </div>
              </div>
            )}
            {activeTab === 'menu' && (
              <div>
                <div style={{display:'flex', justifyContent:'space-between', borderBottom:'2px solid #eee', paddingBottom:'15px', marginBottom:'20px', alignItems:'center'}}>
                   <h2 style={{border:'none', margin:0}}>菜單管理系統</h2>
                   <button onClick={() => {
                      const it = {name:'', price:0, category:'', image:'', hasOptions:false, customOptions:''};
                      setEditingItem(it);
                      setOriginalItem(JSON.stringify(it));
                   }} style={{padding: '10px 20px', background: 'var(--primary-color)', color: '#fff', border: 'none', borderRadius: '8px', cursor: 'pointer', fontWeight: 'bold'}}>＋ 新增餐點</button>
                </div>
                
                <div style={{display: 'flex', gap: '10px', marginBottom: '20px', flexWrap: 'wrap', background: '#fff', padding: '15px', borderRadius: '12px'}}>
                  <button 
                    onClick={() => setFilterCategory('all')} 
                    style={{padding: '8px 16px', borderRadius: '20px', border: '1px solid #ddd', background: filterCategory === 'all' ? 'var(--primary-color)' : '#f8f9fa', color: filterCategory === 'all' ? '#fff' : '#555', cursor: 'pointer', fontWeight: 'bold'}}
                  >
                    全部 ({menuItems.length})
                  </button>
                  {locallySortedCategories.map(cat => {
                    const count = menuItems.filter(item => (categoryLabelMap[item.category] || item.category) === cat).length;
                    return (
                      <button 
                        key={cat}
                        onClick={() => setFilterCategory(cat)} 
                        style={{padding: '8px 16px', borderRadius: '20px', border: '1px solid #ddd', background: filterCategory === cat ? 'var(--primary-color)' : '#f8f9fa', color: filterCategory === cat ? '#fff' : '#555', cursor: 'pointer', fontWeight: 'bold'}}
                      >
                        {cat} ({count})
                      </button>
                    );
                  })}
                </div>

                {menuItems.length === 0 && !editingItem && (
                   <div style={{padding:'50px', textAlign:'center', background:'#fff', borderRadius:'12px'}}>
                     <h3 style={{color:'#777'}}>目前資料庫中沒有任何餐點</h3>
                     <button onClick={() => window.POSDatabase.importDefaultMenu(defaultMenuData)} style={{marginTop:'15px', padding:'15px 30px', background:'#4cd137', color:'#fff', border:'none', borderRadius:'8px', cursor:'pointer', fontSize:'18px'}}>一鍵匯入預設菜單範例</button>
                   </div>
                )}
                {editingItem ? (
                   <div style={{background:'#fff', padding:'30px', borderRadius:'12px', maxWidth:'600px', margin:'0 auto'}}>
                     <h3>{editingItem.id ? '編輯餐點' : '新增餐點'}</h3>
                     <div>
                        <div style={{marginBottom:'15px'}}>
                           <label className="input-label">餐點名稱</label>
                           <input className="input-field" value={editingItem.name} onChange={e=>setEditingItem({...editingItem, name: e.target.value})} />
                        </div>
                        <div style={{marginBottom:'15px'}}>
                           <label className="input-label" style={{display:'flex', justifyContent:'space-between'}}>
                             <span>餐點分類 (可選單或自創新分類)</span>
                           </label>
                           <input 
                             className="input-field" 
                             list="category-options" 
                             placeholder="例如：漢堡、飲料、或自行輸入新分類如：熱炒" 
                             value={editingItem.category} 
                             onChange={e=>setEditingItem({...editingItem, category: e.target.value})} 
                           />
                           <datalist id="category-options">
                              <option value="漢堡" />
                              <option value="點心" />
                              <option value="飲料" />
                              <option value="套餐" />
                              {Array.from(new Set(menuItems.map(i => categoryLabelMap[i.category] || i.category))).map(cat => (
                                 !['漢堡','點心','飲料','套餐','burger','snack','drink','combo'].includes(cat) && <option key={cat} value={cat} />
                              ))}
                           </datalist>
                        </div>
                        <div style={{marginBottom:'15px'}}>
                           <label className="input-label">販售價格</label>
                           <input type="number" className="input-field" value={editingItem.price} onChange={e=>setEditingItem({...editingItem, price: Number(e.target.value)})} />
                        </div>
                        <div style={{marginBottom:'15px'}}>
                           <label className="input-label">圖片網址 (URL)</label>
                           <input className="input-field" value={editingItem.image} onChange={e=>setEditingItem({...editingItem, image: e.target.value})} />
                           {editingItem.image && <img src={editingItem.image} style={{marginTop:'10px', width:'80px', height:'80px', objectFit:'cover', borderRadius:'8px'}} />}
                        </div>
                        <div style={{marginBottom:'25px'}}>
                           <label className="input-label">客製化標籤選項 (多個請用逗號分隔)</label>
                           <input className="input-field" placeholder="例如：不要生菜, 加辣, 去冰, 半糖" value={editingItem.customOptions || ''} onChange={e=>setEditingItem({...editingItem, customOptions: e.target.value})} />
                           <div style={{fontSize:'13px', color:'#777', marginTop:'5px'}}>若不需客製化選項，請留空即可。結帳時客人可複選這些標籤。</div>
                        </div>
                        <div style={{display:'flex', gap:'15px'}}>
                           <button 
                             type="button" 
                             onClick={handleSaveMenu} 
                             className="btn-done" 
                             style={{flex:2, background: isDirty ? '#2ed573' : '#f1f2f6', color: isDirty ? '#fff' : '#aaa', cursor: isDirty ? 'pointer' : 'not-allowed'}}
                             disabled={!isDirty}
                           >
                             儲存
                           </button>
                           <button type="button" onClick={()=>{setEditingItem(null); setOriginalItem(null);}} style={{flex:1, background:'#ddd', cursor:'pointer', border:'none', borderRadius:'8px', fontWeight:'bold'}}>取消</button>
                        </div>
                     </div>
                   </div>
                ) : (
                   <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(350px, 1fr))', gap:'20px'}}>
                     {menuItems
                       .filter(item => filterCategory === 'all' || (categoryLabelMap[item.category] || item.category) === filterCategory)
                       .map(item => (
                        <div key={item.id} style={{background:'#fff', borderRadius:'12px', padding:'15px', display:'flex', gap:'15px', alignItems:'center'}}>
                           <img src={item.image} style={{width:'80px', height:'80px', objectFit:'cover', borderRadius:'8px'}} />
                           <div style={{flex:1}}>
                              <div style={{fontWeight:'bold', fontSize:'20px'}}>{item.name}</div>
                              <div style={{color:'var(--primary-color)', fontWeight:'bold'}}>${item.price}</div>
                              <div style={{color:'#777', fontSize:'14px'}}>{categoryLabelMap[item.category] || item.category} {(item.hasOptions || item.customOptions) && <span style={{color:'var(--primary-color)'}}>✨客製化</span>}</div>
                           </div>
                           <div style={{display:'flex', flexDirection:'column', gap:'8px'}}>
                              <button onClick={() => {
                                 const it = {...item, category: categoryLabelMap[item.category] || item.category};
                                 setEditingItem(it);
                                 setOriginalItem(JSON.stringify(it));
                              }} style={{padding:'8px 15px', background:'#f1f2f6', border:'none', borderRadius:'6px', cursor:'pointer'}}>編輯</button>
                              <button onClick={()=>{if(confirm('確定刪除？')) window.POSDatabase.deleteMenuItem(item.id)}} style={{padding:'8px 15px', background:'#ff6b81', color:'#fff', border:'none', borderRadius:'6px', cursor:'pointer'}}>刪除</button>
                           </div>
                        </div>
                     ))}
                   </div>
                )}
              </div>
            )}
             {activeTab === 'categories' && (
               <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'30px'}}>
                 <div>
                   <h2 style={{borderBottom:'2px solid #eee', paddingBottom:'15px', marginBottom:'20px'}}>1. 分類排序管理</h2>
                   <div style={{background:'#fff', padding:'30px', borderRadius:'12px'}}>
                     <p style={{color:'#777', marginBottom:'20px'}}>調整前台左側選單的顯示順序。</p>
                     {locallySortedCategories.length === 0 ? <div style={{color:'#777'}}>目前沒有任何分類。</div> : (
                       <div style={{display:'flex', flexDirection:'column', gap:'10px'}}>
                         {locallySortedCategories.map((cat, idx) => (
                            <div key={cat} style={{display:'flex', justifyContent:'space-between', padding:'15px', background:'#f8f9fa', borderRadius:'8px', alignItems:'center'}}>
                               <span style={{fontWeight:'bold', fontSize:'18px'}}>{cat}</span>
                               <div style={{display:'flex', gap:'10px'}}>
                                  <button disabled={idx===0} onClick={()=>moveCategory(idx, -1)} style={{padding:'8px 15px', cursor: idx===0 ? 'not-allowed' : 'pointer', border:'1px solid #ccc', borderRadius:'6px', background: idx===0 ? '#eee' : '#fff'}}>↑</button>
                                  <button disabled={idx===locallySortedCategories.length-1} onClick={()=>moveCategory(idx, 1)} style={{padding:'8px 15px', cursor: idx===locallySortedCategories.length-1 ? 'not-allowed' : 'pointer', border:'1px solid #ccc', borderRadius:'6px', background: idx===locallySortedCategories.length-1 ? '#eee' : '#fff'}}>↓</button>
                               </div>
                            </div>
                         ))}
                         <button onClick={handleSaveCategoryOrder} style={{marginTop:'20px', width:'100%', padding:'15px', background:'var(--primary-color)', color:'#fff', border:'none', borderRadius:'8px', fontSize:'18px', fontWeight:'bold', cursor:'pointer'}}>儲存分類排序</button>
                       </div>
                     )}
                   </div>
                 </div>

                 <div>
                    <h2 style={{borderBottom:'2px solid #eee', paddingBottom:'15px', marginBottom:'20px'}}>2. 餐點先後排序</h2>
                    <div style={{background:'#fff', padding:'30px', borderRadius:'12px'}}>
                       <div style={{marginBottom:'20px'}}>
                          <label className="input-label">選擇欲排序的分類：</label>
                          <select className="input-field" value={selectedSortCategory} onChange={e=>setSelectedSortCategory(e.target.value)}>
                             {locallySortedCategories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                          </select>
                       </div>

                       {selectedSortCategory && (
                          <div>
                             {(() => {
                                const catItems = menuItems.filter(item => (categoryLabelMap[item.category] || item.category) === selectedSortCategory);
                                const order = itemOrders[selectedSortCategory] || [];
                                const sortedCatItems = [...catItems].sort((a,b) => {
                                   let ia = order.indexOf(a.id), ib = order.indexOf(b.id);
                                   if(ia===-1) ia=999; if(ib===-1) ib=999;
                                   return ia - ib;
                                });

                                if(sortedCatItems.length === 0) return <div style={{color:'#999'}}>此分類下目前沒有餐點。</div>;

                                return (
                                   <div style={{display:'flex', flexDirection:'column', gap:'10px'}}>
                                      {sortedCatItems.map((item, idx) => (
                                         <div key={item.id} style={{display:'flex', justifyContent:'space-between', padding:'12px', background:'#f1f2f6', borderRadius:'8px', alignItems:'center'}}>
                                            <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
                                               <img src={item.image} style={{width:'40px', height:'40px', borderRadius:'4px', objectFit:'cover'}} />
                                               <span style={{fontWeight:'bold'}}>{item.name}</span>
                                            </div>
                                            <div style={{display:'flex', gap:'5px'}}>
                                               <button 
                                                  disabled={idx===0} 
                                                  onClick={() => {
                                                     const newItems = [...sortedCatItems];
                                                     [newItems[idx], newItems[idx-1]] = [newItems[idx-1], newItems[idx]];
                                                     handleSaveItemOrder(selectedSortCategory, newItems.map(i => i.id));
                                                  }}
                                                  style={{padding:'5px 10px', cursor:'pointer'}}
                                               >↑</button>
                                               <button 
                                                  disabled={idx===sortedCatItems.length-1} 
                                                  onClick={() => {
                                                     const newItems = [...sortedCatItems];
                                                     [newItems[idx], newItems[idx+1]] = [newItems[idx+1], newItems[idx]];
                                                     handleSaveItemOrder(selectedSortCategory, newItems.map(i => i.id));
                                                  }}
                                                  style={{padding:'5px 10px', cursor:'pointer'}}
                                               >↓</button>
                                            </div>
                                         </div>
                                      ))}
                                   </div>
                                );
                             })()}
                          </div>
                       )}
                    </div>
                 </div>
               </div>
             )}
            {activeTab === 'dashboard' && (
              <div>
                <h2>今日營業概況</h2>
                <div className="dashboard">
                  <div className="stat-card">
                    <div style={{color: '#777'}}>總接單數</div>
                    <div className="stat-value">{orders.length} 筆</div>
                  </div>
                  <div className="stat-card">
                    <div style={{color: '#777'}}>今日累積營業額</div>
                    <div className="stat-value">${todayTotal.toLocaleString()}</div>
                  </div>
                </div>
              </div>
            )}
            {activeTab === 'history' && (
              <div>
                <h2>歷史訂單 (已完成出餐)</h2>
                <div className="order-grid">
                  {completedOrders.map(order => {
                    const duration = order.completedAt ? Math.floor((new Date(order.completedAt) - new Date(order.createdAt)) / 60000) : '?';
                    return (
                      <div key={order.id} className="order-card" style={{ border: 'none', background:'#fff' }}>
                        <div className="order-card-header" style={{ background: '#7f8fa6', display:'flex', flexDirection:'column', alignItems:'flex-start', padding:'10px 15px' }}>
                          <div style={{ display:'flex', justifyContent:'space-between', width:'100%', alignItems:'center' }}>
                            <span className="order-summary">單號: {getOrderNo(order.id)}</span>
                            <span style={{opacity:0.9, fontSize:'18px'}}>${order.totalAmount || 0}</span>
                          </div>
                          <div style={{ fontSize:'13px', marginTop:'5px', opacity:0.9 }}>
                             入單: {new Date(order.createdAt).toLocaleTimeString()} | 
                             出餐: {order.completedAt ? new Date(order.completedAt).toLocaleTimeString() : 'N/A'} | 
                             製作耗時: {duration} 分鐘
                          </div>
                        </div>
                        <div className="order-items">
                          {(order.items || []).map((item, idx) => (
                             <div key={idx} style={{ padding:'5px 0', borderBottom:'1px solid #eee' }}>{item.quantity}x {item.title || item.name}</div>
                          ))}
                        </div>
                        <div className="card-actions">
                          <button className="btn-done" style={{background:'#badc58', color:'#2f3640'}} onClick={() => window.POSDatabase.updateOrderStatus(order.id, 'pending')}>退回廚房</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
            {activeTab === 'settings' && (
              <div>
                <h2>系統設定 ⚙️</h2>
                <div style={{background:'#fff', padding:'30px', borderRadius:'12px', maxWidth:'600px'}}>
                   <h3 style={{marginBottom:'20px', borderBottom:'1px solid #eee', paddingBottom:'10px'}}>KDS 廚房看板預警時間</h3>
                   <div style={{marginBottom:'25px'}}>
                      <label className="input-label">🟡 警告時間門檻 (分鐘)</label>
                      <input 
                        type="number" 
                        className="input-field" 
                        value={kdsSettings.yellow} 
                        onChange={e => setKdsSettings({...kdsSettings, yellow: Number(e.target.value)})} 
                      />
                      <p style={{fontSize:'13px', color:'#777', marginTop:'5px'}}>當等待時間超過此數值，訂單標題將變為黃色。</p>
                   </div>
                   <div style={{marginBottom:'30px'}}>
                      <label className="input-label">🔴 緊急時間門檻 (分鐘)</label>
                      <input 
                        type="number" 
                        className="input-field" 
                        value={kdsSettings.red} 
                        onChange={e => setKdsSettings({...kdsSettings, red: Number(e.target.value)})} 
                      />
                      <p style={{fontSize:'13px', color:'#777', marginTop:'5px'}}>當等待時間超過此數值，訂單標題將變為紅色。</p>
                   </div>
                   <button 
                     className="btn-done" 
                     style={{background: 'var(--primary-color)', width:'200px'}} 
                     onClick={handleSaveKDSSettings}
                   >
                     儲存設定
                   </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AdminApp />);
  </script>
</body>
</html>
