<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    window.POSDatabase = (function() {
      const firebaseConfig = { apiKey: "AIzaSyDTsrdVcwm7mi2aGoexNG4QqcEyn6JFqpw", authDomain: "project-a60e1765-a61e-40db-82e.firebaseapp.com", projectId: "project-a60e1765-a61e-40db-82e" };
      let dbMode = 'local', dbInstance = null;
      if (firebaseConfig.apiKey && typeof firebase !== 'undefined') {
        try { if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); dbInstance = firebase.firestore(); dbMode = 'firebase'; } catch(e) { console.error(e); }
      }
      const saveOrder = async (orderInfo) => {
        const newOrder = { ...orderInfo, status: 'pending', createdAt: new Date().toISOString() };
        if (dbMode === 'firebase') await dbInstance.collection('orders').add(newOrder);
      };
      const updateOrderStatus = async (orderId, status) => {
        const updateData = { status };
        if (status === 'completed') updateData.completedAt = new Date().toISOString();
        if (dbMode === 'firebase') await dbInstance.collection('orders').doc(orderId).update(updateData);
      };
      const subscribeToOrders = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('orders').orderBy('createdAt', 'desc').onSnapshot((s) => callback(s.docs.map(doc => ({ ...doc.data(), id: doc.id }))));
      };
      const getMenu = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('menu_items').onSnapshot((s) => callback(s.docs.map(doc => ({ ...doc.data(), id: doc.id }))));
      };
      const getCategoryOrder = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('category_order').onSnapshot((s) => callback(s.exists ? (s.data().order || []) : []));
      };
      const saveCategoryOrder = async (orderArr) => {
        if (dbMode === 'firebase') await dbInstance.collection('settings').doc('category_order').set({ order: orderArr });
      };
      const getItemOrders = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('item_orders').onSnapshot((s) => callback(s.exists ? s.data() : {}));
      };
      const saveItemOrders = async (ordersObj) => {
        if (dbMode === 'firebase') await dbInstance.collection('settings').doc('item_orders').set(ordersObj);
      };
      const getKDSSettings = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('kds_settings').onSnapshot((s) => callback(s.exists ? s.data() : { yellow: 5, red: 10 }));
      };
      const saveKDSSettings = async (settings) => {
        if (dbMode === 'firebase') await dbInstance.collection('settings').doc('kds_settings').set(settings);
      };
      const getUIVisibility = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('ui_visibility').onSnapshot((s) => callback(s.exists ? s.data() : { 
          types: ['內用', '外帶', '外送'], 
          payments: ['現金', '信用卡', 'LINE Pay'] 
        }));
      };
      const saveUIVisibility = async (settings) => {
        if (dbMode === 'firebase') await dbInstance.collection('settings').doc('ui_visibility').set(settings);
      };
      const getCategoryIcons = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('category_icons').onSnapshot((s) => callback(s.exists ? s.data() : {}));
      };
      const saveCategoryIcons = async (icons) => {
        if (dbMode === 'firebase') await dbInstance.collection('settings').doc('category_icons').set(icons);
      };
      const getBranding = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('branding').onSnapshot((s) => callback(s.exists ? s.data() : { 
          name: '德上 POS', 
          logo: 'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?auto=format&fit=crop&q=80&w=100&h=100' 
        }));
      };
      const saveBranding = async (branding) => {
        if (dbMode === 'firebase') await dbInstance.collection('settings').doc('branding').set(branding);
      };
      const saveMenuItem = async (item) => {
        const data = { ...item }; let id = data.id; delete data.id;
        if (dbMode === 'firebase') { if(id) await dbInstance.collection('menu_items').doc(String(id)).update(data); else await dbInstance.collection('menu_items').add(data); }
      };
      const deleteMenuItem = async (id) => { if (dbMode === 'firebase') await dbInstance.collection('menu_items').doc(id).delete(); };
      const importDefaultMenu = async (defaultItems) => {
        if (dbMode === 'firebase') { const batch = dbInstance.batch(); defaultItems.forEach(item => batch.set(dbInstance.collection('menu_items').doc(item.id.toString()), item)); await batch.commit(); }
      };
      return { 
        saveOrder, updateOrderStatus, subscribeToOrders, getMenu, 
        getCategoryOrder, saveCategoryOrder, getItemOrders, saveItemOrders, 
        getKDSSettings, saveKDSSettings, getUIVisibility, saveUIVisibility, 
        getCategoryIcons, saveCategoryIcons,
        getBranding, saveBranding,
        saveMenuItem, deleteMenuItem, importDefaultMenu 
      };

    })();
  </script>

    h2 { font-size: 28px; color: #2f3640; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px;}
    .input-field { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    .input-label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
    .sound-toggle { position: absolute; top: 20px; right: 40px; background: #fff; border: 2px solid #2ed573; padding: 10px 25px; border-radius: 30px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; transition: all 0.2s; }
    .sound-toggle.muted { border-color: #dcdde1; color: #7f8c8d; }
    .type-badge { 
      padding: 6px 12px; 
      border-radius: 6px; 
      font-size: 16px; 
      font-weight: 900; 
      color: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      text-transform: uppercase;
    }
  </style>
</head>
<body onClick="(() => { const a = document.getElementById('orderAudio'); if(a && a.paused) { a.muted = true; a.play().then(() => { a.pause(); a.muted = false; console.log('Audio unlocked'); }).catch(() => {}); } })()">
  <audio id="orderAudio" src="order.mp3" preload="auto"></audio>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    const PRESET_EMOJIS = [
      '🍛', '🍜', '🍲', '🍗', '🍔', '🍟', '🍱', '🍕', '🥘', '🥟', '🥗', '🥪', '🥣', '🍞', '🍝', '🍣', '🍢', '🌯', '🌮', '🥩', '🥓', '🍳', '🥞', '🥨', '🥐',
      '🍰', '🍦', '🍩', '🍪', '🍮', '🥧', '🍫', '🍯',
      '🥤', '☕', '🍺', '🍸', '🍹', '🍷', '🍶', '🍼',
      '🍽️', '🍴'
    ];
    const defaultMenuData = [
      { id: 1, name: '經典牛肉堡', price: 120, category: 'burger', image: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: false },
      { id: 2, name: '雙層起司堡', price: 150, category: 'burger', image: 'https://images.unsplash.com/photo-1586816001966-79b736744398?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: false },
      { id: 3, name: '脆皮炸雞', price: 60, category: 'snack', image: 'https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: false },
      { id: 4, name: '黃金脆薯', price: 50, category: 'snack', image: 'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: false },
      { id: 5, name: '可口可樂', price: 40, category: 'drink', image: 'https://images.unsplash.com/photo-1622483767028-3f66f32aef97?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: true },
      { id: 6, name: '冰紅茶', price: 35, category: 'drink', image: 'https://images.unsplash.com/photo-1556679343-c7306c1976bc?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: true },
      { id: 7, name: '經典套餐', price: 200, category: 'combo', image: 'https://images.unsplash.com/photo-1610614819515-6899ba89e5fc?auto=format&fit=crop&q=80&w=200&h=200', hasOptions: false }
    ];

    function OrderCard({ order, onComplete, getOrderNo, kdsSettings }) {
      const { useState, useEffect } = React;
      const [elapsed, setElapsed] = useState(0);

      const yellowThreshold = kdsSettings?.yellow || 5;
      const redThreshold = kdsSettings?.red || 10;

      useEffect(() => {
        const calc = () => {
          const start = new Date(order.createdAt).getTime();
          setElapsed(Math.floor((Date.now() - start) / 60000));
        };
        calc();
        const tid = setInterval(calc, 10000);
        return () => clearInterval(tid);
      }, [order.createdAt]);

      let color = '#2ed573'; // default green
      if (elapsed >= redThreshold) color = '#ff4757'; // urgent: red
      else if (elapsed >= yellowThreshold) color = '#ffa502'; // warning: yellow

      const typeColors = {
        '內用': '#3498db', // Blue
        '外帶': '#f39c12', // Orange
        '外送': '#9b59b6'  // Purple
      };
      const typeIcons = {
        '內用': '🏠',
        '外帶': '🛍️',
        '外送': '🚲'
      };
      const currentType = order.orderType || '內用';

      return (
        <div className="order-card" style={{ border: `2px solid ${color}` }}>
          <div className="order-card-header" style={{ background: color, display:'flex', flexDirection:'column', alignItems:'flex-start', padding:'10px 15px' }}>
            <div style={{ display:'flex', justifyContent:'space-between', width:'100%', alignItems:'center' }}>
              <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
                <span className="order-summary">單號: {getOrderNo(order.id)}</span>
                <span className="type-badge" style={{ background: typeColors[currentType] || '#7f8c8d' }}>
                  {typeIcons[currentType]} {currentType}
                </span>
              </div>
              <span style={{ fontSize:'14px', opacity:0.9 }}>{new Date(order.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} 入單</span>
            </div>
            <div style={{ fontSize:'16px', fontWeight:'bold', marginTop:'5px' }}>已等候 {elapsed} 分鐘</div>
          </div>
          <div className="order-items">
            {(order.items || []).map((item, idx) => (
               <div key={item.id || idx} className="kds-item">
                 <span className="qty">{item.quantity || 1}</span> {item.title || item.name}
               </div>
            ))}
          </div>
          <div className="card-actions">
            <button className="btn-done" style={{ background: color }} onClick={() => onComplete(order.id)}>完成出餐</button>
          </div>
        </div>
      );
    }

    function AdminApp() {
      const categoryLabelMap = { burger: '漢堡', snack: '點心', drink: '飲料', combo: '套餐' };
      
      const [activeTab, setActiveTab] = useState('kds');
      const [orders, setOrders] = useState([]);
      const [menuItems, setMenuItems] = useState([]);
      const [editingItem, setEditingItem] = useState(null);
      const [originalItem, setOriginalItem] = useState(null);
      const [categoryOrder, setCategoryOrder] = useState([]);
      const [locallySortedCategories, setLocallySortedCategories] = useState([]);
      const [filterCategory, setFilterCategory] = useState('all');
      const [itemOrders, setItemOrders] = useState({});
      const [selectedSortCategory, setSelectedSortCategory] = useState('');
      const [kdsSettings, setKdsSettings] = useState({ yellow: 5, red: 10 });
      const [uiVisibility, setUiVisibility] = useState({ types: ['內用', '外帶', '外送'], payments: ['現金', '信用卡', 'LINE Pay'] });
      const [isMuted, setIsMuted] = useState(false);
      const [isCollapsed, setIsCollapsed] = useState(false);
      const [settingsSubTab, setSettingsSubTab] = useState('kds'); // kds, visibility, icons
      const [categoryIcons, setCategoryIcons] = useState({});
      const [branding, setBranding] = useState({ name: '德上 POS', logo: 'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?auto=format&fit=crop&q=80&w=100&h=100' });
      const [expandedEmojis, setExpandedEmojis] = useState({});
      
      const lastOrderTimeRef = useRef("");
      const isInitialLoadRef = useRef(true);

      const playOrderSound = () => {
        const audio = document.getElementById('orderAudio');
        if (audio) {
          audio.currentTime = 0;
          audio.play().catch(e => console.warn('Audio play blocked:', e));
        }
      };

      useEffect(() => {
        const unsubCatOrder = window.POSDatabase.getCategoryOrder(setCategoryOrder);
        const unsubItemOrders = window.POSDatabase.getItemOrders(setItemOrders);
        const unsubKDSSettings = window.POSDatabase.getKDSSettings(setKdsSettings);
        const unsubUIVisibility = window.POSDatabase.getUIVisibility(setUiVisibility);
        const unsubCategoryIcons = window.POSDatabase.getCategoryIcons(setCategoryIcons);
        const unsubBranding = window.POSDatabase.getBranding(setBranding);
        return () => { 
          unsubCatOrder && unsubCatOrder(); 
          unsubItemOrders && unsubItemOrders();
          unsubKDSSettings && unsubKDSSettings();
          unsubUIVisibility && unsubUIVisibility();
          unsubCategoryIcons && unsubCategoryIcons();
          unsubBranding && unsubBranding();
        };
      }, []);


      const computedCategories = useMemo(() => {
        return Array.from(new Set(menuItems.map(item => categoryLabelMap[item.category] || item.category).filter(Boolean)));
      }, [menuItems]);

      useEffect(() => {
          const sorted = [...computedCategories].sort((a,b) => {
             let ia = categoryOrder.indexOf(a), ib = categoryOrder.indexOf(b);
             if(ia===-1) ia=999; if(ib===-1) ib=999;
             return ia - ib;
          });
          setLocallySortedCategories(sorted);
          if(!selectedSortCategory && sorted.length > 0) setSelectedSortCategory(sorted[0]);
      }, [computedCategories, categoryOrder]);

      const moveCategory = (index, direction) => {
         const newList = [...locallySortedCategories];
         const temp = newList[index];
         newList[index] = newList[index + direction];
         newList[index + direction] = temp;
         setLocallySortedCategories(newList);
      };

      const handleSaveCategoryOrder = async () => {
         try {
           await window.POSDatabase.saveCategoryOrder(locallySortedCategories);
           alert('分類排序儲存成功！');
         } catch(e) {
           alert('儲存失敗：' + e.message);
         }
      };

      const handleSaveItemOrder = async (catName, sortedIds) => {
          try {
            const newOrders = { ...itemOrders, [catName]: sortedIds };
            await window.POSDatabase.saveItemOrders(newOrders);
            alert(`「${catName}」商品排序儲存成功！`);
          } catch(e) {
            alert('儲存失敗：' + e.message);
          }
      };

      useEffect(() => {
        const unsubOrders = window.POSDatabase.subscribeToOrders((data) => {
          const currentData = data || [];
          const pending = currentData.filter(o => o.status === 'pending');
          
          if (pending.length > 0) {
            // Find the latest order timestamp
            const latestTime = pending.reduce((max, o) => o.createdAt > max ? o.createdAt : max, "");
            
            if (!isInitialLoadRef.current && latestTime > lastOrderTimeRef.current) {
              if (!isMuted) {
                playOrderSound();
              }
            }
            lastOrderTimeRef.current = latestTime;
          }
          
          isInitialLoadRef.current = false;
          setOrders(currentData);
        });
        const unsubMenu = window.POSDatabase.getMenu((data) => setMenuItems(data || []));
        return () => { unsubOrders(); unsubMenu(); };
      }, [isMuted]);

      const getOrderNo = (id) => (id || '').includes('-') ? id.split('-')[1] : (id || '').substring(0, 6);
      const pendingOrders = orders.filter(o => o.status === 'pending');
      const completedOrders = orders.filter(o => o.status === 'completed');
      const todayTotal = orders.reduce((sum, order) => sum + (order.totalAmount || 0), 0);

      const handleSaveMenu = async () => {
        if (!editingItem.name || !editingItem.image || editingItem.price <= 0) {
           alert("備註：餐點名稱、圖片網址為必填，且價格必須大於 0！");
           return;
        }
        try {
           await window.POSDatabase.saveMenuItem(editingItem);
           alert("儲存成功！");
           setEditingItem(null);
           setOriginalItem(null);
        } catch(e) {
           alert("Firebase 儲存失敗：" + e.message);
        }
      };

      const isDirty = originalItem && editingItem && originalItem !== JSON.stringify(editingItem);

      const handleCancelEdit = () => {
         if (isDirty) {
            if (!confirm('您有未儲存的變動，確定要返回嗎？製作的修改將會消失。')) return;
         }
         setEditingItem(null);
         setOriginalItem(null);
      };

      const handleToggleVisibility = async (category, value) => {
          const newSettings = { ...uiVisibility };
          if (newSettings[category].includes(value)) {
              newSettings[category] = newSettings[category].filter(v => v !== value);
          } else {
              newSettings[category] = [...newSettings[category], value];
          }
          if (newSettings[category].length === 0) {
              alert('警告：至少必須保留一個選項呈現，否則前台無法進行結帳流程。');
              return;
          }
          setUiVisibility(newSettings);
          try {
             await window.POSDatabase.saveUIVisibility(newSettings);
          } catch(e) { console.error("Save Visibility Error:", e); }
      };

      const handleSaveCategoryIcons = async () => {
          try {
              await window.POSDatabase.saveCategoryIcons(categoryIcons);
              alert('分類圖示儲存成功！');
          } catch(e) {
              alert('儲存失敗：' + e.message);
          }
      };

      const handleSaveBranding = async () => {
        try { await window.POSDatabase.saveBranding(branding); alert('品牌視覺儲存成功！'); } catch(e) { alert('儲存失敗：' + e.message); }
      };


      return (
        <div className={`admin-layout ${isCollapsed ? 'collapsed' : ''}`}>
          <div className="side-nav">
            <div className="collapse-btn" onClick={() => setIsCollapsed(!isCollapsed)}>
              <span className="btn-icon">←</span>
            </div>
            <div style={{ color: '#2f3640', fontSize: '20px', fontWeight:'bold', marginBottom:'30px', display:'flex', gap:'5px' }}>
              {isCollapsed ? (
                <img src={branding.logo} style={{width:'40px', height:'40px', borderRadius:'8px', objectFit:'cover'}} />
              ) : (
                <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
                   <img src={branding.logo} style={{width:'32px', height:'32px', borderRadius:'6px', objectFit:'cover'}} />
                   <span style={{fontSize:'20px', fontWeight:'bold', color:'var(--primary-color)'}}>{branding.name}</span>
                </div>
              )}
            </div>
            <div className={`nav-item ${activeTab === 'kds' ? 'active' : ''}`} onClick={() => setActiveTab('kds')}>
              <span className="icon">👨‍🍳</span>
              <span>廚房看板 ({pendingOrders.length})</span>
            </div>

                            ))}
                         </div>
                      </div>

                      <div style={{marginBottom:'10px'}}>
                         <h3 style={{marginBottom:'15px', fontSize:'18px'}}>💳 支付方式 (Payment Methods)</h3>
                         <div style={{display:'flex', gap:'15px', flexWrap:'wrap'}}>
                            {['現金', '信用卡', 'LINE Pay'].map(pm => (
                               <label key={pm} style={{display:'flex', alignItems:'center', gap:'10px', background: uiVisibility.payments.includes(pm) ? 'rgba(52,152,219,0.1)' : '#f8f9fa', padding:'10px 20px', borderRadius:'30px', border: uiVisibility.payments.includes(pm) ? '2px solid #3498db' : '2px solid #ddd', cursor:'pointer', transition:'all 0.2s'}}>
                                  <input type="checkbox" style={{display:'none'}} checked={uiVisibility.payments.includes(pm)} onChange={() => handleToggleVisibility('payments', pm)} />
                                  <span style={{fontSize:'18px'}}>{pm === '現金' ? '💵' : pm === '信用卡' ? '💳' : '📱'} {pm}</span>
                                  <span style={{color: pm === '現金' || pm === '信用卡' || pm === 'LINE Pay' ? (uiVisibility.payments.includes(pm) ? '#3498db' : '#999') : '#999', fontSize:'14px'}}>{uiVisibility.payments.includes(pm) ? '✅ 已啟用' : '❌ 已停用'}</span>
                               </label>
                            ))}
                         </div>
                      </div>
                    </div>
                  )}

                  {settingsSubTab === 'icons' && (
                    <div className="settings-section">
                      <div className="section-header" style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'25px'}}>
                         <div style={{width:'4px', height:'24px', background:'var(--primary-color)', borderRadius:'2px'}}></div>
                         <h2 style={{margin:0}}>分類選單圖示管理 (Emojis)</h2>
                      </div>
                      <p style={{color:'#777', marginBottom:'25px'}}>為您的餐點分類設定專屬圖示，若未設定則前台將顯示預設圖示 🍽️。</p>
                      
                      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(180px, 1fr))', gap:'20px', marginBottom:'30px'}}>
                         {computedCategories.map(cat => (
                            <div key={cat} style={{background:'#f8f9fa', padding:'20px', borderRadius:'15px', border:'1px solid #eee', display:'flex', flexDirection:'column', alignItems:'center'}}>
                               <div style={{fontWeight:'bold', marginBottom:'15px', fontSize:'16px', color:'#333'}}>{cat}</div>
                               <div style={{display:'flex', gap:'10px', alignItems:'center', marginBottom:'15px'}}>
                                  <input 
                                    type="text" 
                                    placeholder="輸入" 
                                    value={categoryIcons[cat] || ''} 
                                    onChange={e => setCategoryIcons({...categoryIcons, [cat]: e.target.value})} 
                                    style={{width:'70px', padding:'5px', borderRadius:'10px', border:'2px solid var(--primary-color)', textAlign:'center', fontSize:'28px', background:'#fff'}} 
                                  />
                               </div>
                               <div style={{display:'flex', flexWrap:'wrap', gap:'5px', justifyContent:'center', padding:'10px', background:'#fff', borderRadius:'10px', border:'1px solid #eee'}}>
                                  {(expandedEmojis[cat] ? PRESET_EMOJIS : PRESET_EMOJIS.slice(0, 12)).map(emoji => (
                                     <span 
                                       key={emoji} 
                                       onClick={() => setCategoryIcons({...categoryIcons, [cat]: emoji})}
                                       style={{fontSize:'20px', cursor:'pointer', padding:'5px', borderRadius:'5px', transition:'transform 0.1s'}}
                                       onMouseOver={e => e.currentTarget.style.transform = 'scale(1.3)'}
                                       onMouseOut={e => e.currentTarget.style.transform = 'scale(1)'}
                                     >
                                        {emoji}
                                     </span>
                                  ))}
                                  <button 
                                     onClick={() => setExpandedEmojis({...expandedEmojis, [cat]: !expandedEmojis[cat]})}
                                     style={{width:'100%', padding:'8px', background:'#f0f2f5', border:'none', borderRadius:'8px', marginTop:'5px', cursor:'pointer', color:'#555', fontWeight:'bold', transition:'background 0.2s'}}
                                     onMouseOver={e => e.currentTarget.style.background = '#e4e6e9'}
                                     onMouseOut={e => e.currentTarget.style.background = '#f0f2f5'}
                                  >
                                     {expandedEmojis[cat] ? '收起 🔼' : '顯示更多 🔽'}
                                  </button>
                               </div>
                            </div>
                         ))}
                      </div>

                      <button onClick={handleSaveCategoryIcons} className="btn-done" style={{background: 'var(--primary-color)', width:'100%'}}>儲存圖示設定</button>
                    </div>
                  )}

                  {settingsSubTab === 'branding' && (
                    <div className="settings-section">
                      <div className="section-header" style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'25px'}}>
                         <div style={{width:'4px', height:'24px', background:'var(--primary-color)', borderRadius:'2px'}}></div>
                         <h2 style={{margin:0}}>品牌視覺設定 (Branding)</h2>
                      </div>
                      <p style={{color:'#777', marginBottom:'25px'}}>更換您的餐廳名稱與 Logo 圖示，這將同步顯示在點餐前台與管理後台的側邊欄。</p>
                      
                      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'30px', marginBottom:'30px'}}>
                         <div>
                            <div style={{marginBottom:'20px'}}>
                               <label className="input-label">🏆 餐廳名稱 (Restaurant Name)</label>
                               <input 
                                 type="text" 
                                 className="input-field" 
                                 value={branding.name} 
                                 onChange={e => setBranding({...branding, name: e.target.value})} 
                                 placeholder="例如：德上快餐店"
                               />
                            </div>
                            <div style={{marginBottom:'20px'}}>
                               <label className="input-label">🖼️ Logo 圖片網址 (Logo URL)</label>
                               <input 
                                 type="text" 
                                 className="input-field" 
                                 value={branding.logo} 
                                 onChange={e => setBranding({...branding, logo: e.target.value})} 
                                 placeholder="請輸入圖片連結 (HTTPS)"
                               />
                               <p style={{color:'#999', fontSize:'12px', marginTop:'8px'}}>建議使用正方形、透明背景的圖片 (PNG/WebP)。</p>
                            </div>
                         </div>
                         
                         <div style={{background:'#f8f9fa', padding:'25px', borderRadius:'15px', border:'1px dashed #ddd', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center'}}>
                            <div style={{fontSize:'13px', color:'#999', marginBottom:'20px', fontWeight:'bold'}}>即時預覽 (Sidebar Preview)</div>
                            <div style={{background:'#fff', padding:'15px 25px', borderRadius:'12px', boxShadow:'0 4px 10px rgba(0,0,0,0.05)', display:'flex', alignItems:'center', gap:'12px'}}>
                               {branding.logo 
                                 ? <img src={branding.logo} style={{width:'45px', height:'45px', borderRadius:'8px', objectFit:'cover', background:'#eee'}} />
                                 : <span style={{fontSize:'36px'}}>🍟</span>
                               }
                               <span style={{fontSize:'20px', fontWeight:'bold', color:'var(--primary-color)'}}>{branding.name || '德上 POS'}</span>
                            </div>
                         </div>
                      </div>

                      <button onClick={handleSaveBranding} className="btn-done" style={{background: 'var(--primary-color)', width:'100%'}}>儲存品牌設定</button>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AdminApp />);
  </script>
</body>
</html>
