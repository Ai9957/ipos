<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>線上快餐店 POS 系統</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    window.POSDatabase = (function() {
      const firebaseConfig = { apiKey: "AIzaSyDTsrdVcwm7mi2aGoexNG4QqcEyn6JFqpw", authDomain: "project-a60e1765-a61e-40db-82e.firebaseapp.com", projectId: "project-a60e1765-a61e-40db-82e" };
      let dbMode = 'local', dbInstance = null;
      if (firebaseConfig.apiKey && typeof firebase !== 'undefined') {
        try { if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); dbInstance = firebase.firestore(); dbMode = 'firebase'; } catch(e) { console.error(e); }
      }
      const saveOrder = async (orderInfo) => {
        const newOrder = { ...orderInfo, status: 'pending', createdAt: new Date().toISOString() };
        if (dbMode === 'firebase') await dbInstance.collection('orders').add(newOrder);
      };
      const updateOrderStatus = async (orderId, status) => {
        const updateData = { status };
        if (status === 'completed') updateData.completedAt = new Date().toISOString();
        if (dbMode === 'firebase') await dbInstance.collection('orders').doc(orderId).update(updateData);
      };
      const subscribeToOrders = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('orders').orderBy('createdAt', 'desc').onSnapshot((s) => callback(s.docs.map(doc => ({ ...doc.data(), id: doc.id }))));
      };
      const getMenu = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('menu_items').onSnapshot((s) => callback(s.docs.map(doc => ({ ...doc.data(), id: doc.id }))));
      };
      const getCategoryOrder = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('category_order').onSnapshot((s) => callback(s.exists ? (s.data().order || []) : []));
      };
      const saveCategoryOrder = async (orderArr) => {
        if (dbMode === 'firebase') await dbInstance.collection('settings').doc('category_order').set({ order: orderArr });
      };
      const getItemOrders = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('item_orders').onSnapshot((s) => callback(s.exists ? s.data() : {}));
      };
      const saveItemOrders = async (ordersObj) => {
        if (dbMode === 'firebase') await dbInstance.collection('settings').doc('item_orders').set(ordersObj);
      };
      const saveMenuItem = async (item) => {
        const data = { ...item }; let id = data.id; delete data.id;
        if (dbMode === 'firebase') { if(id) await dbInstance.collection('menu_items').doc(String(id)).update(data); else await dbInstance.collection('menu_items').add(data); }
      };
      const deleteMenuItem = async (id) => { if (dbMode === 'firebase') await dbInstance.collection('menu_items').doc(id).delete(); };
      const importDefaultMenu = async (defaultItems) => {
        if (dbMode === 'firebase') { const batch = dbInstance.batch(); defaultItems.forEach(item => batch.set(dbInstance.collection('menu_items').doc(item.id.toString()), item)); await batch.commit(); }
      };
      return { saveOrder, updateOrderStatus, subscribeToOrders, getMenu, getCategoryOrder, saveCategoryOrder, getItemOrders, saveItemOrders, saveMenuItem, deleteMenuItem, importDefaultMenu };
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const categoryLabelMap = { burger: '漢堡', snack: '點心', drink: '飲料', combo: '套餐' };

    function App() {
      const [menuItems, setMenuItems] = useState([]);
      const [isMenuLoaded, setIsMenuLoaded] = useState(false);
      const [categoryOrder, setCategoryOrder] = useState([]);
      const [itemOrders, setItemOrders] = useState({});
      
      useEffect(() => {
        const unsubCat = window.POSDatabase.getCategoryOrder?.(setCategoryOrder);
        const unsubItem = window.POSDatabase.getItemOrders?.(setItemOrders);
        return () => { unsubCat && unsubCat(); unsubItem && unsubItem(); };
      }, []);

      const computedCategories = useMemo(() => {
        const catsArray = Array.from(new Set(menuItems.map(item => categoryLabelMap[item.category] || item.category).filter(Boolean)));
        catsArray.sort((a,b) => {
           let ia = categoryOrder.indexOf(a), ib = categoryOrder.indexOf(b);
           if(ia===-1) ia=999; if(ib===-1) ib=999;
           return ia - ib;
        });
        return [{ id: 'all', name: '全部' }, ...catsArray.map(c => ({ id: c, name: c }))];
      }, [menuItems, categoryOrder]);

      const [activeCategory, setActiveCategory] = useState('all');
      const [cartItems, setCartItems] = useState([]);
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [selectedModifiers, setSelectedModifiers] = useState([]);
      const [showCheckoutModal, setShowCheckoutModal] = useState(false);
      const [showSuccessModal, setShowSuccessModal] = useState(false);

      const getOptionsList = (product) => {
        if (product.customOptions) {
           return product.customOptions.split(/[,、，]/).map(s => s.trim()).filter(s => s);
        }
        if (product.hasOptions) {
           return ['正常冰', '少冰', '去冰', '正常糖', '半糖', '無糖'];
        }
        return [];
      };

      useEffect(() => {
        const unsubscribe = window.POSDatabase.getMenu((data) => {
          setMenuItems(data || []);
          setIsMenuLoaded(true);
        });
        return () => unsubscribe();
      }, []);

      const filteredProducts = useMemo(() => {
        let baseItems = activeCategory === 'all' ? menuItems : menuItems.filter(item => (categoryLabelMap[item.category] || item.category) === activeCategory);
        
        // Apply sorting within category if activeCategory is not 'all'
        // Actually, if 'all', sorting is mixed, but let's at least sort within each group if possible or just rely on category order
        if(activeCategory !== 'all') {
           const order = itemOrders[activeCategory] || [];
           return [...baseItems].sort((a,b) => {
              let ia = order.indexOf(a.id), ib = order.indexOf(b.id);
              if(ia===-1) ia=999; if(ib===-1) ib=999;
              return ia - ib;
           });
        }
        return baseItems;
      }, [activeCategory, menuItems, itemOrders]);

      const totalAmount = useMemo(() => {
        return cartItems.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      }, [cartItems]);

      const handleProductClick = (product) => {
        const optionsList = getOptionsList(product);
        if (optionsList.length > 0) {
          setSelectedProduct({...product, parsedOptions: optionsList});
          setSelectedModifiers([]);
        } else {
          addToCart(product, []);
        }
      };

      const addToCart = (product, activeMods) => {
        const modString = activeMods.length > 0 ? ` (${activeMods.join(', ')})` : '';
        const cartItemId = `${product.id}-${activeMods.join('-')}`;
        
        setCartItems(prev => {
          const existingItem = prev.find(item => item.cartItemId === cartItemId);
          if (existingItem) {
            return prev.map(item => 
              item.cartItemId === cartItemId 
              ? { ...item, quantity: item.quantity + 1 } 
              : item
            );
          }
          return [...prev, { 
            ...product, 
            cartItemId, 
            title: product.name + modString,
            quantity: 1 
          }];
        });
        setSelectedProduct(null);
      };

      const updateQuantity = (cartItemId, delta) => {
        setCartItems(prev => prev.map(item => {
          if (item.cartItemId === cartItemId) {
            const newQuantity = item.quantity + delta;
            return { ...item, quantity: newQuantity > 0 ? newQuantity : 1 };
          }
          return item;
        }));
      };

      const removeItem = (cartItemId) => {
        setCartItems(prev => prev.filter(item => item.cartItemId !== cartItemId));
      };

      const checkout = () => {
        if (cartItems.length === 0) return;
        setShowCheckoutModal(true);
      };

      const handleConfirmCheckout = async () => {
        const orderData = {
          totalAmount,
          items: cartItems.map(item => ({
            id: item.cartItemId,
            name: item.name,
            title: item.title,
            price: item.price,
            quantity: item.quantity
          }))
        };

        try {
          await window.POSDatabase.saveOrder(orderData);
          setCartItems([]);
          setShowCheckoutModal(false);
          setShowSuccessModal(true);
        } catch (error) {
          alert('結帳失敗：' + error.message);
        }
      };

      return (
        <div className="pos-layout">
          <nav className="side-nav">
            <div className="logo">POS</div>
            {computedCategories.map(cat => (
              <div 
                key={cat.id} 
                className={`nav-item ${activeCategory === cat.id ? 'active' : ''}`}
                onClick={() => setActiveCategory(cat.id)}
              >
                {cat.name}
              </div>
            ))}
            <div style={{ marginTop: 'auto', marginBottom: '20px', width: '80%' }}>
              <a href="admin.html" target="_blank" className="nav-item" style={{display: 'block', textDecoration: 'none', color: '#ff4757', border: '1px solid #ffeaa7'}}>前往後台 ⚙️</a>
            </div>
          </nav>

          <main className="main-content">
            <header className="header">
              <h1>{computedCategories.find(c => c.id === activeCategory)?.name || '全部'}</h1>
            </header>
            
            {!isMenuLoaded ? (
               <div style={{padding:'50px', textAlign:'center', color:'#888', fontSize:'20px'}}>菜單同步中...</div>
            ) : menuItems.length === 0 ? (
               <div style={{padding:'50px', textAlign:'center', color:'#ff4757', fontSize:'22px', fontWeight:'bold'}}>
                 老闆還沒有上架任何餐點喔！🍔<br/>
                 <span style={{fontSize:'16px', color:'#777', fontWeight:'normal'}}>請前往「菜單管理」點擊一鍵匯入或手動新增。</span>
               </div>
            ) : (
              <div className="menu-grid">
                {filteredProducts.map(product => (
                  <div 
                    key={product.id} 
                    className="menu-card"
                    onClick={() => handleProductClick(product)}
                  >
                    <div className="card-img-wrapper">
                      <img src={product.image} className="card-img" alt={product.name} />
                    </div>
                    <div className="card-info">
                      <div className="card-title">
                        {product.name} 
                        {(product.hasOptions || product.customOptions) && <span style={{fontSize:'12px', background:'#ffeaa7', padding:'2px 4px', borderRadius:'4px', color:'#d35400', verticalAlign:'middle', marginLeft:'5px'}}>客製</span>}
                      </div>
                      <div className="card-price">${product.price}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </main>

          <aside className="cart-sidebar">
            <div className="cart-header">
              <h2>目前訂單</h2>
            </div>
            <div className="cart-items">
              {cartItems.length === 0 ? (
                <div className="cart-empty">尚未加入任何餐點</div>
              ) : (
                cartItems.map(item => (
                  <div key={item.cartItemId} className="cart-item">
                    <div className="cart-item-main">
                      <span className="cart-item-title">{item.title}</span>
                      <span className="cart-item-price">${item.price * item.quantity}</span>
                    </div>
                    <div className="cart-item-actions">
                      <div className="qty-btn-group">
                        <button className="qty-btn" onClick={() => updateQuantity(item.cartItemId, -1)}>-</button>
                        <span className="qty-label">{item.quantity}</span>
                        <button className="qty-btn" onClick={() => updateQuantity(item.cartItemId, 1)}>+</button>
                      </div>
                      <button className="delete-btn" onClick={() => removeItem(item.cartItemId)}>刪除</button>
                    </div>
                  </div>
                ))
              )}
            </div>
            <div className="cart-footer">
              <div className="summary-row">
                <span>總計</span>
                <span style={{color: 'var(--primary-color)'}}>${totalAmount}</span>
              </div>
              <button 
                className="checkout-btn" 
                onClick={checkout}
                disabled={cartItems.length === 0}
              >
                前往結帳
              </button>
            </div>
          </aside>

          {selectedProduct && (
            <div className="modal-overlay" onClick={() => setSelectedProduct(null)}>
              <div className="modal-box" onClick={e => e.stopPropagation()}>
                <div className="modal-header">
                  選擇 {selectedProduct.name} 專屬選項 (可複選)
                </div>
                
                <div className="modifier-section" style={{ borderBottom: 'none' }}>
                  <div className="modifier-options" style={{ display: 'flex', flexWrap: 'wrap', gap: '10px' }}>
                    {selectedProduct.parsedOptions.map(opt => (
                      <div 
                        key={opt}
                        className={`mod-option ${selectedModifiers.includes(opt) ? 'active' : ''}`}
                        onClick={() => setSelectedModifiers(prev => prev.includes(opt) ? prev.filter(x => x !== opt) : [...prev, opt])}
                        style={{ margin: 0 }}
                      >
                        {opt}
                      </div>
                    ))}
                  </div>
                </div>

                <div className="modal-actions" style={{ marginTop: '20px' }}>
                  <button className="btn btn-cancel" onClick={() => setSelectedProduct(null)}>取消</button>
                  <button 
                    className="btn btn-confirm" 
                    onClick={() => addToCart(selectedProduct, selectedModifiers)}
                  >
                    加入訂單
                  </button>
                </div>
              </div>
            </div>
          )}

          {showCheckoutModal && (
            <div className="modal-overlay" onClick={() => setShowCheckoutModal(false)}>
              <div className="modal-box" style={{ width: '500px' }} onClick={e => e.stopPropagation()}>
                <div className="modal-header" style={{ borderBottom: '2px solid #eee', paddingBottom: '15px' }}>
                  確認訂單資訊
                </div>
                
                <div style={{ maxHeight: '300px', overflowY: 'auto', padding: '15px 0' }}>
                  {cartItems.map(item => (
                    <div key={item.cartItemId} style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '10px', fontSize: '18px' }}>
                      <div style={{ flex: 1 }}>
                        <span style={{ fontWeight: 'bold', color: 'var(--primary-color)', marginRight: '10px' }}>{item.quantity}x</span>
                        {item.title}
                      </div>
                      <div style={{ fontWeight: 'bold' }}>${item.price * item.quantity}</div>
                    </div>
                  ))}
                </div>

                <div style={{ borderTop: '2px solid #eee', paddingTop: '15px', marginTop: '10px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '22px', fontWeight: 'bold' }}>
                    <span>應付總額</span>
                    <span style={{ color: 'var(--primary-color)' }}>${totalAmount}</span>
                  </div>
                </div>

                <div className="modal-actions" style={{ marginTop: '30px' }}>
                  <button className="btn btn-cancel" onClick={() => setShowCheckoutModal(false)}>再檢查一下</button>
                  <button 
                    className="btn btn-confirm" 
                    onClick={handleConfirmCheckout}
                    style={{ background: '#4cd137', color: '#fff' }}
                  >
                    確認送出訂單
                  </button>
                </div>
              </div>
            </div>
          )}

          {showSuccessModal && (
            <div className="modal-overlay" onClick={() => setShowSuccessModal(false)}>
              <div className="modal-box" style={{ width: '400px', textAlign: 'center', padding: '40px' }} onClick={e => e.stopPropagation()}>
                <div style={{ fontSize: '80px', color: '#4cd137', marginBottom: '20px' }}>✓</div>
                <div style={{ fontSize: '24px', fontWeight: 'bold', marginBottom: '30px' }}>訂單已成功送出！</div>
                <button 
                  className="btn btn-confirm" 
                  onClick={() => setShowSuccessModal(false)}
                  style={{ background: 'var(--primary-color)', color: '#fff', width: '100%', padding: '15px', fontSize: '20px' }}
                >
                  太棒了！
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
