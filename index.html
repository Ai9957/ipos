<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍟 德上快餐店 POS 系統</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    window.POSDatabase = (function() {
      const firebaseConfig = { apiKey: "AIzaSyDTsrdVcwm7mi2aGoexNG4QqcEyn6JFqpw", authDomain: "project-a60e1765-a61e-40db-82e.firebaseapp.com", projectId: "project-a60e1765-a61e-40db-82e" };
      let dbMode = 'local', dbInstance = null;
      if (firebaseConfig.apiKey && typeof firebase !== 'undefined') {
        try { if (!firebase.apps.length) firebase.initializeApp(firebaseConfig); dbInstance = firebase.firestore(); dbMode = 'firebase'; } catch(e) { console.error(e); }
      }
      const saveOrder = async (orderInfo) => {
        const newOrder = { ...orderInfo, status: 'pending', createdAt: new Date().toISOString() };
        if (dbMode === 'firebase') await dbInstance.collection('orders').add(newOrder);
      };
      const getMenu = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('menu_items').onSnapshot((s) => callback(s.docs.map(doc => ({ ...doc.data(), id: doc.id }))));
      };
      const getCategoryOrder = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('category_order').onSnapshot((s) => callback(s.exists ? (s.data().order || []) : []));
      };
      const getItemOrders = (callback) => {
        if (dbMode === 'firebase') return dbInstance.collection('settings').doc('item_orders').onSnapshot((s) => callback(s.exists ? s.data() : {}));
      };
      return { saveOrder, getMenu, getCategoryOrder, getItemOrders };
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    function POSApp() {
      const [cart, setCart] = useState([]);
      const [activeCategory, setActiveCategory] = useState('全部');
      const [menuItems, setMenuItems] = useState([]);
      const [categoryOrder, setCategoryOrder] = useState([]);
      const [itemOrders, setItemOrders] = useState({});
      
      const [showCheckout, setShowCheckout] = useState(false);
      const [showOptionsModal, setShowOptionsModal] = useState(null);
      const [selectedOptions, setSelectedOptions] = useState([]);

      // Checkout Enhancements State
      const [orderType, setOrderType] = useState('內用'); // 內用, 外帶, 外送
      const [paymentMethod, setPaymentMethod] = useState('現金'); // 現金, 信用卡, LINE Pay
      const [amountPaid, setAmountPaid] = useState('');
      const [isProcessing, setIsProcessing] = useState(false);

      useEffect(() => {
        const unsubMenu = window.POSDatabase.getMenu(setMenuItems);
        const unsubCat = window.POSDatabase.getCategoryOrder(setCategoryOrder);
        const unsubItemOrders = window.POSDatabase.getItemOrders(setItemOrders);
        return () => { unsubMenu(); unsubCat(); unsubItemOrders(); };
      }, []);

      const categoryLabelMap = { burger: '漢堡', snack: '點心', drink: '飲料', combo: '套餐' };
      const categories = useMemo(() => {
        const cats = Array.from(new Set(menuItems.map(item => categoryLabelMap[item.category] || item.category).filter(Boolean)));
        return ['全部', ...cats].sort((a, b) => {
          if (a === '全部') return -1; if (b === '全部') return 1;
          let ia = categoryOrder.indexOf(a), ib = categoryOrder.indexOf(b);
          return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
        });
      }, [menuItems, categoryOrder]);

      const sortedMenuItems = useMemo(() => {
        const filtered = menuItems.filter(item => activeCategory === '全部' || (categoryLabelMap[item.category] || item.category) === activeCategory);
        const order = itemOrders[activeCategory] || [];
        return [...filtered].sort((a,b) => {
           let ia = order.indexOf(a.id), ib = order.indexOf(b.id);
           return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
        });
      }, [menuItems, activeCategory, itemOrders]);

      const addToCart = (product, options = []) => {
        const existing = cart.find(item => item.id === product.id && JSON.stringify(item.options) === JSON.stringify(options));
        if (existing) {
          setCart(cart.map(item => item === existing ? { ...item, quantity: item.quantity + 1 } : item));
        } else {
          setCart([...cart, { ...product, quantity: 1, options }]);
        }
      };

      const updateQuantity = (index, delta) => {
        const newCart = [...cart];
        newCart[index].quantity += delta;
        if (newCart[index].quantity <= 0) newCart.splice(index, 1);
        setCart(newCart);
      };

      const totalAmount = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

      const handleCheckout = async () => {
        if (cart.length === 0) return;
        setIsProcessing(true);
        try {
          const change = paymentMethod === '現金' ? (Number(amountPaid) - totalAmount) : 0;
          await window.POSDatabase.saveOrder({ 
            items: cart.map(i => ({ ...i, title: i.name + (i.options?.length ? ` (${i.options.join(', ')})` : '') })), 
            totalAmount,
            orderType,
            paymentMethod,
            amountPaid: paymentMethod === '現金' ? Number(amountPaid) : totalAmount,
            change: change > 0 ? change : 0
          });
          setCart([]);
          setShowCheckout(false);
          setAmountPaid('');
          setOrderType('內用');
          setPaymentMethod('現金');
          alert('訂單已送出並同步至廚房看板！🍔');
        } catch (e) {
          alert('結帳失敗：' + e.message);
        } finally {
          setIsProcessing(false);
        }
      };

      const handleNumpad = (val) => {
        if (val === 'C') setAmountPaid('');
        else setAmountPaid(prev => prev + val);
      };

      const change = (paymentMethod === '現金' && amountPaid) ? (Number(amountPaid) - totalAmount) : 0;

      return (
        <div className="pos-container">
          <div className="sidebar">
            <h2>🍟 德上快餐店</h2>
            <div className="categories">
              {categories.map(cat => (
                <div key={cat} className={`category-item ${activeCategory === cat ? 'active' : ''}`} onClick={() => setActiveCategory(cat)}>
                  {cat}
                </div>
              ))}
            </div>
          </div>
          <div className="main-content">
            <div className="product-grid">
              {sortedMenuItems.map(product => (
                <div key={product.id} className="product-card" onClick={() => {
                   if (product.customOptions || product.hasOptions) {
                      const opts = (product.customOptions || '').split(',').map(s => s.trim()).filter(Boolean);
                      if (opts.length > 0) {
                         setShowOptionsModal(product);
                         setSelectedOptions([]);
                      } else { addToCart(product); }
                   } else { addToCart(product); }
                }}>
                  <img src={product.image} alt={product.name} />
                  <div className="product-info">
                    <div className="product-name">{product.name}</div>
                    <div className="product-price">${product.price}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div className="cart-panel">
            <h3>🛒 購物車</h3>
            <div className="cart-items">
              {cart.map((item, index) => (
                <div key={index} className="cart-item">
                  <div style={{flex:1}}>
                    <div style={{fontWeight:'bold'}}>{item.name}</div>
                    {item.options?.length > 0 && <div style={{fontSize:'12px', color:'#777'}}>{item.options.join(', ')}</div>}
                    <div>${item.price} x {item.quantity}</div>
                  </div>
                  <div className="quantity-controls">
                    <button onClick={() => updateQuantity(index, -1)}>-</button>
                    <span>{item.quantity}</span>
                    <button onClick={() => updateQuantity(index, 1)}>+</button>
                  </div>
                </div>
              ))}
            </div>
            <div className="cart-footer">
              <div className="total">總計: ${totalAmount}</div>
              <button className="btn-checkout" onClick={() => { if(cart.length > 0) setShowCheckout(true); }}>結帳送出</button>
            </div>
          </div>

          {showOptionsModal && (
            <div className="modal-overlay">
              <div className="modal-content" style={{maxWidth:'400px'}}>
                <h3>選擇客製化： {showOptionsModal.name}</h3>
                <div style={{display:'flex', flexWrap:'wrap', gap:'10px', margin:'20px 0'}}>
                   {(showOptionsModal.customOptions || '').split(',').map(opt => {
                      const s = opt.trim(); if(!s) return null;
                      const active = selectedOptions.includes(s);
                      return (
                        <button key={s} onClick={() => {
                           if(active) setSelectedOptions(selectedOptions.filter(o => o !== s));
                           else setSelectedOptions([...selectedOptions, s]);
                        }} style={{padding:'10px 15px', borderRadius:'20px', border:'1px solid #ddd', background: active ? 'var(--primary-color)' : '#fff', color: active ? '#fff' : '#333'}}>
                          {s}
                        </button>
                      );
                   })}
                </div>
                <div style={{display:'flex', gap:'10px'}}>
                   <button className="btn-confirm" onClick={() => { addToCart(showOptionsModal, selectedOptions); setShowOptionsModal(null); }}>加入購物車</button>
                   <button className="btn-cancel" onClick={() => setShowOptionsModal(null)}>取消</button>
                </div>
              </div>
            </div>
          )}

          {showCheckout && (
            <div className="modal-overlay">
              <div className="modal-content checkout-modal" style={{maxWidth:'700px', display:'flex', flexDirection:'row', gap:'20px', padding:'30px'}}>
                <div style={{flex: 1}}>
                  <h3 style={{marginTop:0}}>結帳與付款</h3>
                  <div style={{marginBottom:'20px', background:'#f8f9fa', padding:'15px', borderRadius:'10px'}}>
                    <div style={{fontSize:'18px', marginBottom: '10px'}}>點餐內容：</div>
                    {cart.map((item, idx) => (
                      <div key={idx} style={{display:'flex', justifyContent:'space-between', marginBottom:'5px', fontSize:'14px'}}>
                        <span>{item.quantity}x {item.name}</span>
                        <span>${item.price * item.quantity}</span>
                      </div>
                    ))}
                    <div style={{borderTop:'1px solid #ddd', marginTop:'10px', paddingTop:'10px', fontSize:'24px', fontWeight:'bold', color:'var(--primary-color)', textAlign:'right'}}>
                      應付總額: ${totalAmount}
                    </div>
                  </div>

                  <div style={{marginBottom:'20px'}}>
                    <label style={{display:'block', marginBottom:'8px', fontWeight:'bold'}}>點餐類型：</label>
                    <div style={{display:'flex', gap:'10px'}}>
                      {['內用', '外帶', '外送'].map(t => (
                        <button key={t} onClick={() => setOrderType(t)} style={{flex:1, padding:'12px', borderRadius:'8px', border:'2px solid', borderColor: orderType === t ? 'var(--primary-color)' : '#ddd', background: orderType === t ? '#fff3ed' : '#fff', fontWeight:'bold'}}>{t}</button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label style={{display:'block', marginBottom:'8px', fontWeight:'bold'}}>支付方式：</label>
                    <div style={{display:'flex', gap:'10px', marginBottom:'15px'}}>
                      {['現金', '信用卡', 'LINE Pay'].map(p => (
                        <button key={p} onClick={() => setPaymentMethod(p)} style={{flex:1, padding:'12px', borderRadius:'8px', border:'2px solid', borderColor: paymentMethod === p ? 'var(--primary-color)' : '#ddd', background: paymentMethod === p ? '#fff3ed' : '#fff', fontWeight:'bold'}}>{p}</button>
                      ))}
                    </div>
                  </div>

                  <div style={{display:'flex', gap:'10px', marginTop:'20px'}}>
                    <button className="btn-confirm" style={{flex:1, height:'60px', fontSize:'20px'}} onClick={handleCheckout} disabled={isProcessing || (paymentMethod === '現金' && Number(amountPaid) < totalAmount)}>
                      {isProcessing ? '處理中...' : '確認結帳送出'}
                    </button>
                    <button className="btn-cancel" style={{padding:'0 25px'}} onClick={() => setShowCheckout(false)} disabled={isProcessing}>關閉</button>
                  </div>
                </div>

                {paymentMethod === '現金' && (
                  <div style={{width:'300px', borderLeft:'1px solid #eee', paddingLeft:'20px'}}>
                    <h4 style={{marginTop:0}}>現金計算機 (TWD)</h4>
                    <div style={{background:'#eee', padding:'15px', borderRadius:'8px', marginBottom:'15px', textAlign:'right'}}>
                      <div style={{fontSize:'12px', color:'#777'}}>實付金額</div>
                      <div style={{fontSize:'32px', fontWeight:'bold'}}>${amountPaid || 0}</div>
                      <div style={{borderTop:'1px solid #ccc', marginTop:'5px', paddingTop:'5px', color: change >= 0 ? '#2ed573' : '#ff4757'}}>
                        {change >= 0 ? `應找零: $${change}` : `還差: $${Math.abs(change)}`}
                      </div>
                    </div>
                    
                    <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:'8px'}}>
                       {[1,2,3,4,5,6,7,8,9,0,'00'].map(n => (
                         <button key={n} onClick={() => handleNumpad(n.toString())} style={{padding:'15px', fontSize:'20px', borderRadius:'8px', border:'1px solid #ddd', background:'#fff', fontWeight:'bold'}}>{n}</button>
                       ))}
                       <button onClick={() => handleNumpad('C')} style={{padding:'15px', fontSize:'20px', borderRadius:'8px', border:'1px solid #ddd', background:'#ff6b81', color:'#fff', fontWeight:'bold'}}>C</button>
                    </div>

                    <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:'8px', marginTop:'15px'}}>
                      <button onClick={() => setAmountPaid(String(Number(amountPaid) + 100))} style={{padding:'10px', background:'#f1f2f6', border:'1px solid #ddd', borderRadius:'8px', fontWeight:'bold'}}>+100</button>
                      <button onClick={() => setAmountPaid(String(Number(amountPaid) + 500))} style={{padding:'10px', background:'#f1f2f6', border:'1px solid #ddd', borderRadius:'8px', fontWeight:'bold'}}>+500</button>
                      <button onClick={() => setAmountPaid(String(Number(amountPaid) + 1000))} style={{padding:'10px', background:'#f1f2f6', border:'1px solid #ddd', borderRadius:'8px', fontWeight:'bold'}}>+1000</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<POSApp />);
  </script>
</body>
</html>
